---
task:
  name: "LikeC4 Architecture Model Build"

  objective: >
    You are working on project {project_path}.
    Build a complete LikeC4 architecture model for this project, focused
    on security-relevant facts: external interactions, trust boundaries,
    authentication / authorization touch points, data stores and the
    classes of data they hold, and outbound integrations.

    The canonical LikeC4 source MUST be maintained in the memory note
    `likec4_source`. Validate the source via the `validate_likec4` tool
    after every meaningful edit. The final task result MUST be the
    full content of `likec4_source` (the validated DSL).

    Inputs you should consume before exploring code:
      - Project information:  project_information/result
      - Dependency inventory: dependency_information/result

    Read existing memories and records first.

  skills:
    - likec4

  instructions: >

    ## Core Principles

    - The two upstream artifacts (project_information, dependency_information)
      are your primary system map. Do not rebuild them; mine them for
      external integrations, entry points, data stores, secrets handling,
      authentication and authorization patterns.
    - Anchor every model element / relationship to concrete code evidence.
      If exact lines are unknown, use the file path plus a short rationale.
    - The model is security-first. Every external system, every outbound
      call, every data store, every entry point is a potential attack
      surface — name it, tag it, and place it in the right trust zone.
    - The LikeC4 source lives in a single memory note called
      `likec4_source`. Read it at the start of every iteration; write the
      full updated content back after each edit; validate with
      validate_likec4 before adding more.

    ## Required Coverage

    The final model MUST represent at minimum:

      1. External actors
         - end users (anonymous / authenticated)
         - administrators / operators
         - third-party callers (partners, webhooks)

      2. Inbound entry points
         - HTTP / REST APIs (one per logical service)
         - gRPC / RPC endpoints
         - message-queue consumers / event handlers
         - scheduled jobs / cron / workers
         - CLI / admin tooling

      3. Internal containers
         - each service / process / worker the project deploys
         - identity / auth subsystems if first-party

      4. Data stores
         - relational / document / KV databases
         - object storage
         - caches
         - message brokers (also as integrations)
         - secret stores / KMS
         - audit / log sinks
         Tag stores with the data classes they hold:
           #pii, #secrets, #tokens, #credentials, #audit, #business

      5. External integrations (each as its own element)
         - identity providers (OIDC / SAML / OAuth2)
         - payment / billing
         - email / SMS / push notification providers
         - third-party APIs the project calls
         - telemetry / observability
         - cloud provider services (object storage, queues, KMS, secrets)
         Tag with #external and the protocol used.

      6. Trust boundaries
         - encode boundaries via tags (#public, #dmz, #internal, #admin)
           and via container grouping
         - every relationship that crosses a boundary should name the
           crossing in its title (e.g. "internet → DMZ over HTTPS")

      7. Security-relevant relationships
         - authentication: "authenticates via", "issues tokens",
           "validates JWT", etc.
         - authorization: "checks RBAC against", "evaluates policy via"
         - cryptography / secrets: "fetches secrets from",
           "encrypts payload with"
         - sensitive data flow: "stores PII", "logs audit events",
           "processes payment data"
         - outbound calls: include protocol and credential type in the
           title (e.g. "calls payments-api over HTTPS w/ mTLS")

    ## Required Views

    At least three views MUST be present:

      - `systemLandscape` — full system overview, autoLayout lr.
      - `containers` — internal container detail, autoLayout lr.
      - a security-focused view (`security` or `external_surface`) that
        emphasises the external attack surface, identity boundaries, and
        stores tagged #pii / #secrets.

    Add additional views (deployment, dynamic flows for auth) only when
    the supporting evidence is concrete. Do not pad views.

    ## Workflow

    1. Read `likec4_source` (if present) and any prior `likec4_*` memories.
    2. Read project_information and dependency_information from the inbox
       memories injected by the upstream tasks.
    3. Build / extend the model in this order:
         a. specification block — element kinds, deployment kinds,
            relationship kinds, tags, colors needed.
         b. model block — actors → system boundary → containers →
            external systems → data stores → relationships.
         c. views block — systemLandscape, containers, security view.
    4. After EVERY non-trivial edit:
         - write_memory("likec4_source", <full new source>)
         - validate_likec4(content=<full new source>)
         - if any issues are reported: fix them before proceeding
    5. Use the `likec4` skill memory (index + references) to look up
       exact DSL syntax — predicates, identifier rules, scoping, view
       options. Do NOT guess syntax.
    6. Record explored vs unexplored coverage and any uncertainties to
       memory under `likec4_uncertainties`.
    7. Stop when validate_likec4 returns no issues AND the required
       coverage above is met.

    ## Tool Usage Rules

    - Code: prefer search_def / list_symbols for handlers, clients,
      adapters, integrations. Use grep for framework decorators, route
      registrations, queue subscribers, env-var lookups (`os.environ`,
      `os.getenv`, config keys), and outbound HTTP libraries.
    - Memory: read existing entries before writing; update the same
      `likec4_source` note rather than appending duplicates.
    - LikeC4: validate after every edit. Do NOT continue building while
      errors remain.
    - Coverage: use list_untouched_files / interaction_stats to make sure
      handlers, jobs, and integration adapters have actually been read.

    ## Anti-Drift Rules

    - Do NOT model internal helper functions, utilities, or library
      classes. The unit of modeling is a deployable container or an
      external system.
    - Do NOT invent integrations the code does not show.
    - Do NOT include implementation details unrelated to security
      (logging formatters, config parsers, data mappers).
    - Do NOT output the DSL inline in chat — it lives in
      `likec4_source` only.

    ## Failure Handling

    - validate_likec4 errors → fix syntactically before adding new content.
    - Validator command not available (Likec4NotFoundError) → record the
      blocker in memory and continue building the source; mark the task
      as blocked rather than skipping validation entirely.
    - Conflicting evidence between artifacts and code → prefer code,
      record the conflict in `likec4_uncertainties`.

  output_format: >
    The final task result MUST be the full validated content of the
    `likec4_source` memory note (a single LikeC4 DSL document).

    Prepend a short Markdown header summarising:

    ## Coverage
    - Containers modeled: <count> (names)
    - External systems modeled: <count> (names)
    - Data stores modeled: <count> (names + tags)
    - Trust boundaries encoded: <list>
    - Views produced: <list>

    ## Validation
    - Last validate_likec4 status: ok | <N issues>
    - Outstanding warnings: <list or none>

    ## Uncertainties
    - <items left out and why>

    ## LikeC4 Source

    ```likec4
    <full likec4_source content>
    ```

    Do NOT paste the source twice. Do NOT include code excerpts beyond
    the LikeC4 block.
