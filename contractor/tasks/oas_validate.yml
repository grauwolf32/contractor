task:
  name: "OpenAPI Consistency Review & Repair"

  objective: >
    Inspect the tool-managed OpenAPI schema, identify structural inconsistencies
    that can be verified from lint results, targeted schema reads, memory, and
    project code inspection, and apply the smallest evidence-based fixes using
    OpenAPI write tools only.

  instructions: >
    Use an iterative inspect -> compare -> fix -> verify workflow.
    Never manually reconstruct or paste the full OpenAPI document.

    Start by calling lint_openapi to get linting problems.

    Then inspect only the smallest relevant surface area needed to verify each issue.
    Use project code inspection tools when needed:
    - grep
    - ls
    - glob
    - read_file

    Use targeted OpenAPI reads for affected areas:
    - get_path
    - get_component
    - get_info
    - list_paths
    - list_components
    - list_servers

    Use get_full_openapi_schema only when a cross-cutting consistency check is
    unavoidable and cannot be verified with targeted reads.

    Read existing memory when it may help, and write useful findings or verified
    decisions back to memory as you make progress.

    For each issue:
    1. Inspect
       - Read the lint finding carefully.
       - Identify the smallest affected unit: info, server, path, component, or ref usage.

    2. Compare
       - Verify the issue against targeted schema reads and, when relevant, project code.
       - If the issue cannot be proven with available tools, do not guess.

    3. Fix
       - Apply the smallest safe fix using OpenAPI write tools only:
         - set_info
         - add_server
         - upsert_path
         - upsert_component
         - remove_server
         - remove_path
         - remove_component
       - Prefer minimal localized edits.
       - Prefer upsert over remove unless removal is clearly supported by the codebase.
       - Use remove_* only when an element is clearly unsupported by code or clearly invalid.

    4. Verify
       - Re-read only the modified sections.
       - Confirm the change resolved the issue without introducing obvious regressions.
       - Re-run lint_openapi when needed to confirm progress after one or more fixes.

    Keep working until the assigned subtask is complete or you are blocked by
    missing inputs. If something is unclear, infer only reasonable, low-risk defaults
    and proceed. If blocked, report what you checked, what failed, and the smallest
    concrete next step.

    Look for issues that can be verified with the available tools, including:
    - missing or weak info.title / framework / code_language metadata
    - missing paths or obviously incorrect paths
    - missing reusable components of supported types:
      schemas, securitySchemes, requestBodies, headers, responses
    - unresolved or suspicious references discovered while inspecting touched paths/components
    - invalid or duplicate-looking server entries
    - inconsistent security scheme usage visible in path/component definitions
    - path/component provenance metadata missing from touched entries
      (x-path-files / x-component-files)

    Constraints:
    - Use OpenAPI write tools only for schema changes.
    - Do not manually reconstruct the OpenAPI schema.
    - Do not make broad speculative edits.
    - Do not force a fix when the evidence is insufficient.
    - Record uncertain items as warnings or blockers instead of guessing.

  output_format: >
    Produce Markdown with:
    1. Issues found
    2. Fixes applied
    3. Verification reads performed
    4. Remaining warnings / blockers

    For each issue, indicate whether it was:
    - fixed
    - warning only
    - blocked

    Do not paste the schema.