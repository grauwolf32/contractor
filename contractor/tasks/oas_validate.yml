---
task:
  name: "OpenAPI Consistency Review & Repair"
  objective: >
    Inspect the tool-managed OpenAPI schema, identify structural inconsistencies
    that can be verified from the available schema reads and project code, and
    apply the smallest evidence-based fixes using OpenAPI write tools only.

  instructions: >
    Use an iterative inspect -> compare -> fix -> verify workflow.
    Never manually reconstruct or paste the full OpenAPI document.

    Start with lightweight reads:
    - get_info
    - list_paths
    - list_components
    - list_servers

    Use targeted reads for affected areas:
    - get_path
    - get_component

    Use get_full_openapi_schema only when a cross-cutting consistency check is unavoidable.

    Look for issues that can be verified with the available tools, including:
    - missing or weak info.title / framework / code_language metadata
    - missing paths or obviously incorrect paths
    - missing reusable components of supported types:
      schemas, securitySchemes, requestBodies, headers, responses
    - unresolved or suspicious references discovered while inspecting touched paths/components
    - invalid or duplicate-looking server entries
    - inconsistent security scheme usage visible in path/component definitions
    - path/component provenance metadata missing from touched entries
      (x-path-files / x-component-files)

    Apply corrections using:
    - set_info
    - add_server
    - upsert_path
    - upsert_component
    - remove_server
    - remove_path
    - remove_component

    Use remove_* only when an element is clearly unsupported by the codebase.
    After each fix, reread only the modified sections and confirm the change.

    If a suspected problem cannot be proven with the available tools, do not guess.
    Record it as a warning or blocker instead of forcing a schema change.

  output_format: >
    Produce Markdown with:
    1. Issues found
    2. Fixes applied
    3. Verification reads performed
    4. Remaining warnings / blockers
    Do not paste the schema.