task:
  name: "annotate_request_trace_for_vulnerability_analysis"

  objective: >
    Given a single OpenAPI operation, locate the request entrypoint, trace the
    relevant execution path, insert structured trace annotations, and produce
    a structured analysis of data flow and security-relevant behavior.

    Focus only on paths where request-derived data is processed, validated,
    transformed, or reaches sensitive operations.

    Target operation: {operation_id}
    Schema: {operation_schema}

  instructions: >

    ## Core Principles

    - Follow request-derived data through the system
    - Prefer concrete, code-backed paths over speculation
    - Do not assume behavior not visible in code
    - Annotate only where it adds clear trace value (entry, validation, sink, or critical transformation)
    - STOP as soon as sufficient information is collected to produce final output
    - Clearly distinguish: observed code behavior vs inference vs uncertainty
    - If a clear vulnerability is discovered during tracing, report it immediately and continue only if needed for confirmation
    - Do not introduce file paths, config files, or components not already observed unless the next task is explicitly to verify their existence.

    ## State Management (CRITICAL)

    - Treat previously discovered files, functions, and flows as working context; do not extend them beyond shown evidence    
    - NEVER re-search or re-verify something that was already confirmed
    - Reuse results from earlier steps instead of repeating file discovery
    - If data is already in memory, use it directly

    ## Scope Control (ANTI-DRIFT)

    - Do NOT introduce new goals (e.g., refactoring, instrumentation design, trace system design)
    - Do NOT switch to tasks like "add tracing framework" or "improve code"
    - Only:
      - locate entrypoint
      - trace data flow
      - annotate
      - analyze security

    ## Planning Rules
    - Assign investigation goals, not search mechanics.
    - Describe what must be learned, not which low-level file discovery steps to perform.
    - Let the worker choose the concrete search/read actions.
    - While decomposition, prefer fewer, meaningful steps over many micro-steps
    - A task must produce NEW information, not restate intent
    - A task should resolve one meaningful uncertainty about control flow, data flow, validation, sink reachability, or vulnerability evidence.
      Do not create tasks for directory listing, existence checks, or other low-level exploration unless they are strictly necessary.

    ## Completion Criteria (MANDATORY STOP CONDITION)

    STOP execution when ALL are satisfied:
    1. Entrypoint is identified
    2. Request parameters are mapped (body/query/path/headers)
    3. At least one complete, non-ambiguous data flow path is traced to:
       - a sink OR
       - a terminal business operation (e.g., DB save) 
    4. Validation (or absence) is identified
    5. Security mechanism (auth/authz) is identified

    Once these are done → IMMEDIATELY produce final output.
    DO NOT create new subtasks after this point.

    ## Annotation Format

      # @trace target=<operation_id> args=<arg:state,...> calls=<symbol,...>
      # @validate arg=<arg> kind=<kind>
      # @sink kind=<kind> arg=<arg_or_unknown>

    Argument states:
      tainted   — request-derived input
      validated — explicit validation present
      clean     — trusted/internal
      derived   — computed from other values

    Only annotate based on visible code evidence.
    Do not invent target - user OperationId or function name 

    ## Sink Catalogue

    DATABASE:
      db.query, db.exec, db.query.raw, db.exec.raw, db.orm.bulk

    FILESYSTEM:
      filesystem.read, filesystem.write, filesystem.delete, filesystem.path.join

    PROCESS:
      shell.exec, shell.exec.args, process.env.write

    NETWORK:
      http.request, http.redirect, dns.lookup, socket.connect, smtp.send

    RENDERING:
      template.render, template.render.raw, html.render, pdf.render

    SERIALIZATION:
      parser.process, parser.yaml.unsafe, parser.pickle,
      serializer.encode, serializer.decode

    CACHE / QUEUE:
      cache.read, cache.write, queue.publish, queue.consume

    CRYPTO / SECRETS:
      crypto.key.derive, crypto.random.seed, crypto.sign, secret.log

    AUTH / AUTHZ:
      auth.token.verify, auth.token.create, authz.policy.eval,
      auth.password.check, auth.password.hash

    REFLECTION:
      reflect.eval, reflect.import, reflect.attr

    OBSERVABILITY:
      log.write, metric.record, audit.write

    IPC / INTER-SERVICE:
      grpc.call, ipc.pipe, ldap.query, xpath.query, nosql.query

    ## Sink → Vulnerability Checklist

    For each sink encountered on the traced path, walk the matching list.
    A "no required control" answer is a candidate finding. Reaching a sink
    alone is NOT a vulnerability.

    filesystem.read / write / delete / path.join
      - Is the path attacker-controlled (tainted/derived)?
      - Is the destination confined (allowlist, normalize+prefix-check, no `..`)?
      - For write/delete: is the content/target attacker-controlled?
      → Path Traversal / Arbitrary Read|Write|Delete

    db.query.raw / db.exec.raw
      - Does tainted data appear in string concat / f-string / %-format /
        text() with substitution? (controls QUERY STRUCTURE, not just values)
      → SQL Injection. Parameterized ORM calls are NOT this sink.

    shell.exec / shell.exec.args
      - shell=True or tainted token in command string?
      - Allowlist or exec-with-args (no shell)?
      → OS Command Injection / RCE.

    http.request
      - URL/host attacker-controlled?
      - Outbound allowlist? Internal/metadata addresses blocked?
      → SSRF.

    http.redirect
      - Target URL attacker-controlled and validated against allowlist?
      → Open Redirect.

    template.render.raw / html.render
      - Tainted data rendered without auto-escape or explicit escape?
      - Template selected from tainted input?
      - Render call visible in THIS service's traced path?
      → SSTI / XSS.

    parser.pickle / parser.yaml.unsafe / serializer.decode
      - Input attacker-controlled? Deserializer safe (yaml.safe_load, JSON)?
      → Insecure Deserialization / RCE.

    reflect.eval / reflect.import / reflect.attr / db.orm.bulk
      - Symbol / expression / field-set attacker-controlled?
      - Allowlist of permitted keys?
      → RCE / Mass Assignment.

    auth.token.create  AND  auth.token.verify  — CHECK AS A PAIR
      - Real cryptographic signature on create (HMAC/JWT lib)?
      - Verify actually reads AND compares the signature?
        (Common bug: payload decoded but signature never checked.)
      - Verify checks exp/nbf/iss/aud where present?
      - Signing key hardcoded? Algorithm pinned (no `none`)?
      → Token Forgery / Privilege Escalation / Replay.

    auth.password.hash / auth.password.check
      - Slow KDF (bcrypt/argon2/scrypt) with salt? Constant-time compare?
      - Plaintext storage or `===` comparison?
      → Credential Compromise.

    authz.policy.eval (or absence)
      - Subject identity tied to the resource? Ownership / RBAC enforced?
      → Broken Access Control / IDOR.

    response with domain object
      - Object passed through a sanitizer/projection?
      - Sensitive fields (password, apiKey, token, paymentMemo) excluded?
      - Sibling handler returning the same object DOES sanitize but this one
        doesn't → Shape C finding.
      → Sensitive Data Exposure.

    cookie.set on session/auth
      - HttpOnly, Secure, SameSite all set?
      → Session Fixation / Theft.

    crypto.random.seed / crypto.key.derive
      - CSPRNG used for security-relevant values? Adequate key length?
      → Weak Randomness / Weak Key Material.

    log.write / secret.log
      - Secrets, credentials, or PII written to logs?
      → Sensitive Data Exposure.

    ldap.query / nosql.query / xpath.query / smtp.send
      - Tainted data interpolated into query/header structure?
      → LDAP / NoSQL / XPath Injection / Email Header Injection.

    ## Execution Steps (MANDATORY)

    1. Identify the entrypoint:
       - Match HTTP method and path
       - Use routing decorators and framework conventions
       - Use x-path-file / x-component-file as strong hints
       - Confirm with schema structure
       - If found → DO NOT search for it again

    2. Trace execution:
       - Start from request inputs (path, query, body, headers)
       - Identify how control is routed to the target logic (e.g., inline branch, map lookup, router, registry, dispatcher, virtual call)
       - Follow how data propagates through function calls
       - Track transformations, validation, sinks, and parameter origin (query/body/path/header)
       - Ignore unrelated or generic helpers
       - STOP when full path is clear

    3. Select functions to annotate:
       - entrypoint
       - functions handling request-derived data
       - validation points (explicit only)
       - sink functions or wrappers
       - key transformations needed to explain flow

    4. Insert annotations:
       - place comments directly above function definitions
       - do not duplicate or overwrite existing annotations
       - annotate only high-confidence, relevant functions
       - DO NOT attempt annotation if file content is not available

    5. Verify annotations are present
       - If verification fails due to tooling/parsing → DO NOT retry endlessly
       - Proceed to final analysis if annotations are logically correct

    6. Analyze business value of the operation

    7. Security analysis:

       7a. Per-handler control checklist — list each row as
           `present (file:line) | absent | weak`:
             - authentication
             - authorization
             - ownership / scoping
             - input_validation (per request-derived arg)
             - output_filter (domain object sanitization)
             - rate_limit / csrf (if applicable)
           Each "absent"/"weak" row on a sensitive operation is a Shape B
           candidate.

       7b. Create/verify pair rule:
           If you annotated a `create`/`sign`/`encode` for a credential or
           session token, you MUST also open and inspect the corresponding
           `verify`/`parse`/`decode` before reporting. The most damaging
           crypto bugs hide on the verify side.

       7c. Cross-handler comparison:
           If two handlers return the same domain object and only one applies
           a sanitizer/projection, the unfiltered one is a Shape C candidate.

       7d. Finding shapes — a finding must match exactly one:
             Shape A — tainted/derived input controls structure at a sink AND
                       a control is missing/weak.
             Shape B — sensitive operation reachable without required control
                       (auth, authz, signature_verify, expiry_check,
                       role_check, ownership_check, csrf).
             Shape C — sensitive value at rest / in transit / in response
                       without protection (plaintext credentials, hardcoded
                       secrets, cookie flags, unfiltered response, secret
                       logged, weak randomness).
           Shapes B and C are first-class. Do NOT force a taint→sink
           narrative when the bug is a missing control or at-rest defect.
           Reaching a sink alone is NOT a vulnerability.

       7e. For each finding, record:
             - shape:                A | B | C
             - control_missing:      one of {{auth, authz, signature_verify,
               expiry_check, role_check, ownership_check, csrf,
               path_confinement, input_validation, output_filter,
               secret_storage, cookie_flags, tls, rate_limit, other}}
             - evidence_lines:       file:line, ...
             - exploit_precondition: e.g. unauthenticated / any authenticated
                                     user / knows victim id

       7f. Defects on files you opened that are not on the traced flow
           (hardcoded secrets, plaintext password storage, cookie flag gaps,
           weak crypto algorithms) are Shape C — report them once per session
           with a deterministic slug, do NOT skip them.

    ## Failure Handling

    - If a step result cannot be parsed:
      → Extract useful data manually and CONTINUE
      → DO NOT restart the same step

    - If file already read but tool says "not found":
      → TRUST MEMORY, not tool inconsistency

    - If partial data is sufficient:
      → COMPLETE task instead of retrying

  output_format: |
    ## Changes Applied

    ### Files modified
    - <file>: <N> annotation block(s) inserted

    ### Annotation blocks inserted
    file: <path>  function: <name>
    @trace target=... args=... calls=...
    @validate arg=... kind=...   (if applicable)
    @sink kind=... arg=...       (if applicable)
    (repeat per function)

    ---

    ## Trace Summary

    - Entrypoint: <function> in <file>
    - Data flow:
      <param> → <fn A> → <fn B> → <fn C>
      (include arg states and sink if present)

    ---

    ## Operation Summary

    - Business purpose: <what the operation does>
    - Data handled: <input/output types, sensitivity>
    - Key transformations: <DB, external calls, serialization, etc.>

    ---

    ## Per-Handler Control Checklist

    | control            | status                              |
    |--------------------|-------------------------------------|
    | authentication     | present (file:line) / absent / weak |
    | authorization      | present (file:line) / absent / weak |
    | ownership/scoping  | present (file:line) / absent / weak |
    | input_validation   | present (file:line) / absent / weak |
    | output_filter      | present (file:line) / absent / weak |
    | rate_limit / csrf  | present (file:line) / absent / N/A  |

    ---

    ## Security Summary

    For each finding (only if supported by code):
      - shape:                A | B | C
      - control_missing:      <closed-set tag>
      - evidence_lines:       file:line, ...
      - exploit_precondition: <e.g. any authenticated user>
      - severity / confidence
      - title / summary

    ---

    ## Uncertainties

    - Routing: <unclear handler resolution>
    - Call targets: <dynamic or unresolved calls>
    - Validation gaps: <possible but not visible validation>
    - Sink confidence: <uncertain sink classification>
    - Missed branches: <paths not followed>
    - Infrastructure unknowns: <auth, proxies, headers not verified>
    - Duplicate root causes deferred: <if applicable>