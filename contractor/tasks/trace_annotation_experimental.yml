task:
  name: "annotate_request_trace_for_vulnerability_analysis"

  objective: >
    Given a single OpenAPI operation, locate the request entrypoint, trace the
    execution path, and insert structured trace annotations above relevant function
    definitions. Capture how request data flows toward sensitive operations (sinks),
    identify validation checkpoints, and produce a vulnerability report.

    Scope:
    - Work only on the code path relevant to the target operation.
    - Insert comments only — no logic, formatting, or unrelated changes.
    - If unsure about a function's role, skip it.
    - Trust already-annotated functions; do not re-annotate them.

    Target operation: {operation_id}
    Schema: {operation_schema}

  instructions: >

    # ANNOTATION FORMAT
    
    Insert directly above `def` (or equivalent). Never mid-function or after.
    #
    #   # @trace op=<operation_id> args=<arg:state,...> calls=<symbol,...>
    #   # @validate arg=<arg> kind=<validation_kind>
    #   # @sink kind=<sink_kind> arg=<arg_or_unknown>
    #
    # Rules:
    # - All three are optional per function; use only what applies.
    # - @trace  — required on every annotated function; list arg states and
    #             direct in-scope callees only (no transitive calls).
    # - @validate — only when explicit validation is visible in THIS function
    #               (type check, regex, allowlist, schema, escaping call).
    # - @sink   — only when a sensitive call site is visible in THIS function.
    #
    # Argument states:
    #   tainted   — directly from request (path/query/body/header/cookie)
    #   validated — tainted + explicit validation passed before this point
    #   clean     — trusted constant or internally generated
    #   derived   — computed from other args; inherits worst state of inputs
    #               (tainted + clean without validation = derived, never clean)

    # ── SINK CATALOGUE ─────────────────────────────────────────────────────
    #
    # DATABASE
    #   db.query            db.exec           db.query.raw (SQLi risk)
    #   db.exec.raw         db.orm.bulk       (mass-assignment risk)
    #
    # FILESYSTEM
    #   filesystem.read     filesystem.write    filesystem.delete
    #   filesystem.path.join  (path-traversal risk before read/write)
    #
    # PROCESS
    #   shell.exec (shell=True)   shell.exec.args   process.env.write
    #
    # NETWORK
    #   http.request (SSRF)   http.redirect   dns.lookup
    #   socket.connect        smtp.send
    #
    # RENDERING
    #   template.render       template.render.raw (critical SSTI)
    #   html.render (XSS)     pdf.render
    #
    # SERIALIZATION
    #   parser.process        parser.yaml.unsafe (RCE)   parser.pickle (RCE)
    #   serializer.encode     serializer.decode
    #
    # CACHE / QUEUE
    #   cache.read    cache.write    queue.publish    queue.consume
    #
    # CRYPTO / SECRETS
    #   crypto.key.derive   crypto.random.seed   crypto.sign   secret.log
    #
    # AUTH / AUTHZ
    #   auth.token.verify   auth.token.create   authz.policy.eval
    #   auth.password.check auth.password.hash
    #
    # REFLECTION
    #   reflect.eval (RCE)   reflect.import   reflect.attr
    #
    # OBSERVABILITY
    #   log.write    metric.record    audit.write
    #
    # IPC / INTER-SERVICE
    #   grpc.call   ipc.pipe   ldap.query   xpath.query   nosql.query

    # ── SINK → VULNERABILITY CHECKLIST ─────────────────────────────────────
    #
    # For each sink encountered on the traced path, walk the matching list.
    # A "no required control" answer is a candidate finding. Reaching a sink
    # alone is NOT a vulnerability — apply the structural question for each
    # class.
    #
    # filesystem.read / filesystem.write / filesystem.delete / filesystem.path.join
    #   - Is the path argument attacker-controlled (tainted/derived)?
    #   - Is the destination confined? (allowlist, normalize+prefix-check, no `..`)
    #   - For write/delete: is the content/target attacker-controlled?
    #   → Path Traversal / Arbitrary Read|Write|Delete
    #
    # db.query.raw / db.exec.raw
    #   - Does tainted data appear inside string concatenation, f-string,
    #     %-format, or text()-with-substitution?  Structure-controlling, not
    #     just parameter values?
    #   → SQL Injection. Parameterized ORM calls are NOT this sink.
    #
    # shell.exec / shell.exec.args
    #   - Is shell=True or any tainted token in the command string?
    #   - Is there an allowlist or exec-with-args (no shell)?
    #   → OS Command Injection / RCE.
    #
    # http.request
    #   - Is the URL/host attacker-controlled?
    #   - Is there an allowlist for outbound destinations?
    #   - Are internal/metadata addresses blocked?
    #   → SSRF.
    #
    # http.redirect
    #   - Is the target URL attacker-controlled and validated against an
    #     allowlist of relative paths or hosts?
    #   → Open Redirect.
    #
    # template.render.raw / html.render
    #   - Is tainted data rendered without auto-escaping or explicit escape?
    #   - Is the template itself selected from tainted input?
    #   - Is the render call in THIS service's traced path? (Data persisted to
    #     DB and later rendered by another service is out of scope unless that
    #     render path is also traced.)
    #   → SSTI / XSS.
    #
    # parser.pickle / parser.yaml.unsafe / serializer.decode
    #   - Is the input attacker-controlled?
    #   - Is the deserializer safe (yaml.safe_load, JSON, msgpack with whitelists)?
    #   → Insecure Deserialization / RCE.
    #
    # reflect.eval / reflect.import / reflect.attr / db.orm.bulk
    #   - Is the symbol/expression/field-set attacker-controlled?
    #   - Is there an allowlist of permitted keys?
    #   → RCE / Mass Assignment.
    #
    # auth.token.create  AND  auth.token.verify  — ALWAYS CHECK AS A PAIR
    #   - Does create produce a real cryptographic signature (HMAC/JWT lib)?
    #   - Does verify actually read AND compare the signature?
    #     (Common bug: payload is decoded but signature is never checked.)
    #   - Does verify check exp/nbf/iss/aud where present?
    #   - Is the signing key a hardcoded constant?
    #   - Is the algorithm pinned (no `none`, no algorithm confusion)?
    #   → Token Forgery / Privilege Escalation / Replay.
    #
    # auth.password.hash / auth.password.check
    #   - Is hashing a slow KDF (bcrypt/argon2/scrypt) with salt?
    #   - Is comparison constant-time?
    #   - Is the password stored or compared in plaintext?
    #   → Credential Compromise.
    #
    # authz.policy.eval  (or absence thereof)
    #   - Is the subject identity tied to the resource being accessed?
    #   - Is there an ownership or RBAC check on this handler?
    #   → Broken Access Control / IDOR.
    #
    # response with domain object
    #   - Is the response object passed through a sanitizer/projection?
    #   - Are sensitive fields (password, apiKey, token, paymentMemo) excluded?
    #   - If a sibling handler returning the same object DOES sanitize and
    #     this one does not, the unfiltered one is a Shape C finding.
    #   → Sensitive Data Exposure.
    #
    # cookie.set on session/auth tokens
    #   - Are HttpOnly, Secure, SameSite all set?
    #   → Session Fixation / Theft.
    #
    # crypto.random.seed / crypto.key.derive
    #   - Is a CSPRNG used for security-relevant values?
    #   - Is the key length adequate and the KDF non-trivial?
    #   → Weak Randomness / Weak Key Material.
    #
    # log.write / secret.log
    #   - Are secrets, credentials, or PII written to logs?
    #   → Sensitive Data Exposure.
    #
    # ldap.query / nosql.query / xpath.query / smtp.send
    #   - Is tainted data interpolated into the query/header structure?
    #   → LDAP / NoSQL / XPath Injection / Email Header Injection.

    # ── EXECUTION PHASES ───────────────────────────────────────────────────

    ## Phase 1 — Plan (complete before any file changes)

    1a. Candidate entrypoint
        - Use operation method + path + schema to locate the handler.
        - Use x-path-file / x-component-file as strong hints.
        - Follow framework routing conventions (decorators, route maps).
        - If multiple candidates, rank and select most plausible.
        - If NO plausible entrypoint found → stop, report in Uncertainties.

    1b. Trace execution graph
        - Follow the call graph along paths carrying request-derived data.
        - Stop a branch when: request data no longer propagates, OR a sink
          is reached (record it, stop that branch).
        - Ignore generic utilities unless they contain a sink or validation.

    1c. Function selection list
        For each function to annotate, state:
        - name and file location
        - why it is on the request path
        - which annotation types apply
        - sink kind (if @sink)
        - any uncertainty

    1d. Root-cause deduplication
        - Before adding a finding, check whether the same root cause (same
          vulnerable code location, same mechanism) was already reported for
          another operation in this session.
        - If yes: note the duplicate in Uncertainties and do NOT call
          report_vulnerability again. Reference the prior slug instead.
        - A shared bypass function (e.g. _is_dwh_integration) triggered on
          multiple endpoints is ONE root-cause finding, not N findings.

    1e. Per-handler control checklist (mandatory before §2)
        For the target handler, list each row as
        `present (file:line) | absent | weak`:

          - authentication       — is a session/token validated?
          - authorization        — is the caller permitted on THIS resource?
          - ownership / scoping  — does the resource id belong to the caller?
          - input_validation     — schema/type/format on each request-derived arg
          - output_filter        — domain object passed through a projection
          - rate_limit / csrf    — where applicable

        Any "absent" or "weak" row on a sensitive operation is a Shape B
        candidate (see §4a).

    1f. Create/verify pair rule
        If you annotate a `create`/`sign`/`encode` function for a credential
        or session token, you MUST also open and annotate the corresponding
        `verify`/`parse`/`decode` function in the same module before reporting.
        The most damaging crypto bugs hide on the verify side (signature not
        checked, expiry ignored, algorithm not pinned).

    ## Phase 2 — Infer annotation content

    2a. Arg states: request params → tainted; computed from tainted without
        validation → derived; passes explicit validation → validated.

    2b. @validate: only if validation code is visible in THIS function's body.
        Do NOT infer from function names alone.

    2c. @sink: only if call site is visible in THIS function's body.
        Use most specific catalogue kind. Arg unknown if not determinable.

    ## Phase 3 — Apply annotations

    - Insert immediately above the `def` line.
    - Do not duplicate existing annotations.
    - Do not remove or overwrite any existing comments.
    - Minimum required insertions only — do not rewrite files.

    ## Phase 4 — Vulnerability report

    4a. Finding shapes
        A finding must match ONE of these shapes. Shapes B and C are
        first-class — do NOT force a taint→sink narrative when the bug is a
        missing control or an at-rest/in-transit defect.

          Shape A — Tainted flow into a sink
            tainted/derived input → optional transformations → sink, AND
            the input controls structure/path/command (not just a value),
            AND a control that would block exploitation is missing or weak.

          Shape B — Sensitive operation reachable without required control
            Examples: missing authentication, missing authorization (IDOR),
            signature not verified, expiry not checked, role not enforced,
            ownership not enforced, CSRF protection absent.

          Shape C — Sensitive value at rest, in transit, or in response
                    without protection
            Examples: plaintext credentials in storage, hardcoded secrets in
            source, cookie missing HttpOnly/Secure, sensitive fields returned
            unfiltered, secrets logged, weak randomness for security values.

        Reaching a sink alone is NOT a vulnerability (Shape A requires the
        structural-control mechanic). Each "absent" row from the §1e checklist
        is a Shape B candidate. Defects on files you opened that are not
        on the traced flow (hardcoded secrets, plaintext password storage,
        cookie flags, weak crypto algorithms) are Shape C — report them once
        per session under §1d dedup, do not skip them.

        Vulnerability candidate criteria — ALL must hold:
          (i)   The finding fits exactly one shape above with code evidence.
          (ii)  The vulnerability is exploitable given realistic prerequisites
                (see §4e). Hypothetical prerequisites lower confidence, not
                severity on their own.
          (iii) The finding has not already been reported this session (§1d).

    4b. For each vulnerability, call report_vulnerability once:

          report_vulnerability(
            name       = "<kebab-case-slug>",          # stable, deterministic
            place_type = "<file|url>",
            place      = "<file-path-or-api-path>",
            title      = "<short human-readable title>",
            summary    = "<what is vulnerable; what attacker can do>",
            severity   = "<critical|high|medium|low|info>",
            # critical: RCE, full auth bypass, full data breach
            # high:     significant exposure, privilege escalation,
            #           cross-tenant data access with realistic prerequisites
            # medium:   limited impact, requires chaining or non-default config
            # low:      defence-in-depth gap, minor information leak
            # info:     observation only, not directly exploitable
            confidence = "<high|medium|low>",
            # high:   sink + tainted arg + exploitability all clearly visible
            # medium: sink visible, data-flow or exploitability requires
            #         assumptions about code not directly read
            # low:    circumstantial, incomplete trace, needs further review
            details    = "<MUST include all of:
                            shape:           A | B | C
                            control_missing: one of {{auth, authz,
                              signature_verify, expiry_check, role_check,
                              ownership_check, csrf, path_confinement,
                              input_validation, output_filter, secret_storage,
                              cookie_flags, tls, rate_limit, other}}
                            evidence_lines:  file:line, ...
                            exploit_precondition: e.g. unauthenticated /
                              any authenticated user / knows victim id /
                              can set header X
                            poc_notes, recommended mitigation>",
          )

    4c. If no vulnerabilities found, do not call report_vulnerability.
    4d. One call per vulnerability — do not batch.

    4e. Prerequisite verification (mandatory before assigning severity)
        For every candidate finding, explicitly state and verify:

        AUTH LAYER
        - Is there authentication middleware upstream of this handler?
          If yes: unauthenticated exploitation is not a valid PoC.
          Reduce scope to authenticated-attacker model.

        HEADER TRUST BOUNDARY
        - Are the relevant headers (e.g. X-Subject, X-Subject-Kind) set by a
          trusted proxy/gateway that strips client-supplied values?
          If the infrastructure config (Oathkeeper, Nginx, Envoy rules) shows
          headers are injected by the proxy, NOT forwarded from clients:
          the bypass is not externally exploitable → lower confidence to medium
          or low, note the infrastructure dependency explicitly.
        - If the config is NOT available for review: state this as an
          uncertainty; do not assume exploitability.

        INJECTION MECHANICS
        - For SQL/command injection: confirm the sink uses string concatenation
          or equivalent (text() + f-string, % formatting, raw execute with
          user input). ORM parameterized calls (session.add, .filter(col==val))
          are NOT injection sinks regardless of input taint.
        - For XSS: confirm a render call in THIS service's traced path outputs
          tainted data to HTML without escaping. Data stored to DB is not XSS
          unless the render path is also traced.

        CONFIGURATION-DEPENDENT RISKS
        - Feature flags / toggles that disable security checks: report as
          medium/low with confidence low unless you can confirm the toggle
          is exposed to untrusted actors or is off by default in production.
          Do not report as high/critical based solely on the toggle existing.

  output_format: >
    ## Changes Applied

    ### Files modified
    - <file>: <N> annotation block(s) inserted

    ### Annotation blocks inserted
    file: <path>  function: <name>
    @trace op=... args=... calls=...
    @validate arg=... kind=...   ← if applicable
    @sink kind=... arg=...       ← if applicable
    _(repeat per function)_

    ---

    ## Trace Summary

    - **Entrypoint:** `<function>` in `<file>`
    - **Data flow:**
      `<param>` → `<fn A>` (tainted) → `<fn B>` (derived) → `<fn C>`
      (@sink db.query.raw) ⚠ SQL Injection

    ---

    ## Operation Summary

    - **Business purpose:** <what the operation does>
    - **Data handled:** <input/output types, sensitivity>
    - **Key transformations:** <DB queries, external calls, serialization, etc.>

    ---

    ## Per-Handler Control Checklist

    | control            | status                              |
    |--------------------|-------------------------------------|
    | authentication     | present (file:line) / absent / weak |
    | authorization      | present (file:line) / absent / weak |
    | ownership/scoping  | present (file:line) / absent / weak |
    | input_validation   | present (file:line) / absent / weak |
    | output_filter      | present (file:line) / absent / weak |
    | rate_limit / csrf  | present (file:line) / absent / N/A  |

    ---

    ## Security Summary

    For each finding:
      - shape:                A | B | C
      - control_missing:      <one tag from the closed set>
      - evidence_lines:       file:line, ...
      - exploit_precondition: <e.g. any authenticated user>
      - severity / confidence

    ---

    ## Uncertainties

    - **Routing:** <unclear handler resolution>
    - **Call targets:** <dynamic dispatch, unresolved decorators>
    - **Validation gaps:** <possible but not visible validation>
    - **Sink confidence:** <probable but unconfirmed sinks>
    - **Missed branches:** <paths not followed and why>
    - **Infrastructure unknowns:** <gateway config not reviewed, header
      stripping unconfirmed, auth middleware not traced>
    - **Duplicate root causes deferred:** <slug → prior report reference>