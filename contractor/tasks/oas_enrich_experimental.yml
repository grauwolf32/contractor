task:
  name: "Incremental OpenAPI Enrichment with Source Provenance"

  objective: >
    Working in project {project_path}, incrementally update, model, and maintain
    the OpenAPI spec from source code in small, verifiable steps. Continuously track
    exploration coverage so the codebase is analyzed systematically and relevant areas
    are not missed.

  instructions: >
    Act as a senior backend engineer maintaining an existing OpenAPI document.

    Core approach:
      - Work incrementally: update one path or a small related group at a time.
      - Discover endpoints, parameters, request bodies, responses, and security from code.
      - When new endpoints and components are discovered, add them to the schema immediately.
      - Prefer reusable components over inline schemas when possible.
      - Enrich both paths and components with source provenance.
      - When a group of related schemas is needed (e.g., request + response for one
        endpoint), create ALL schemas in a single step before adding the path that
        references them. Never add a path that references a schema that does not yet exist.

    Operating procedure:
    1. Review prior records and existing memories.
      - IMPORTANT: do not skip this step; read only memory entries you consider relevant.
      - Memories and records may contain useful information.

    2. Inspect the current OpenAPI state using the smallest necessary
       reads (enumerate paths/components/servers, fetch top-level info,
       fetch a single path or component on demand).

    3. Check exploration coverage before planning by querying the worker's
       coverage inspection capabilities (interaction statistics and
       enumerations of touched, untouched, and match-only files).
       Prioritize untouched, matched, or weakly explored areas. Do not
       keep revisiting the same files while relevant gaps remain.

    4. Plan minimal, additive, evidence-based updates:
      - Prefer strongly supported endpoints and components.
      - Improve both schema quality and coverage.
      - Before adding any path, confirm every $ref it uses already exists
        in components. If not, create the missing component first.

    5. Apply changes through the worker's schema-mutation capabilities only:
      - Set top-level info, add servers, upsert paths and components.
      - Removals (servers / paths / components) are permitted only when an
        entry is provably incorrect; otherwise prefer deprecation or notes.

    6. Verify after each write:
      - Immediately read back the just-written entry (single path or
        component) to confirm persistence.
      - If verification fails, retry the write once. If it fails again,
        record the failure and move on.

    Validation rules:
    - Coverage inspection is mandatory throughout the workflow.
    - operationIds must be stable and unique.
    - All discovered supported paths/components must be added.
    - New or updated paths/components must carry provenance metadata when evidence supports it.

    Efficiency:
    - Immediately add all discovered paths and components.
    - Memories may contain useful information; the planner may consult its
      own memory tools directly, but only read memory that is clearly relevant.
    - Avoid pulling the whole OpenAPI document except for broad consistency
      review or final validation (worker-only).
    - Batch closely related updates when safe (e.g., create 3 schemas in
      sequence, then add the path that references all of them).
    - Never output YAML during intermediate steps.
    - Do not create separate subtasks for verification; verify inline after each write.
    - Prefer doing work over planning work. If a step requires only one or
      two operations, execute it directly instead of creating a subtask.
    - Call the finish action only once, after the task is complete.

    Constraints:
    - Never output YAML during the build phase.
    - Apply all schema changes through the worker's schema-mutation
      capabilities only — never edit OpenAPI artifacts directly.
    - Every write operation (path or component upsert) MUST be immediately
      verified by reading back the result in the same step. If the read-back
      fails, retry the write once before reporting failure.
    - Do not decompose work beyond two levels of subtasks. If a subtask is
      simple enough to execute directly (e.g., a single component upsert),
      execute it inline rather than creating a child task.

    Provenance requirements:
    - Paths and operations: include x-file-path when supported by evidence.
    - Reusable components: include x-file-path and x-component-path when supported by evidence.
    - If existing paths/components lack provenance, add it during the same incremental update.
    - Do not invent exact locations; use the strongest supported evidence.

  output_format: >
    Produce Markdown that summarizes:
    - What was added or updated (with write-then-verify confirmation for each item)
    - Why it was changed
    - What evidence supports it, with file references
    - Coverage impact, including newly touched files and reduced untouched areas
    - What paths or components have not been added and why
    - Any write operations that failed verification after retry

    Do not paste the schema.
    Before finishing, the worker (not the planner) must validate
    completeness by enumerating paths and components in the managed schema.
    Ensure that you have added all discovered paths and components.
