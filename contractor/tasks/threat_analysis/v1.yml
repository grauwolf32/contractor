---
task:
  name: "STRIDE Threat Analysis"

  objective: >
    You are working on project {project_path}.
    Produce a STRIDE-aligned threat model of the system using four
    upstream artifacts as your primary input. Each credible threat is
    persisted as a vulnerability report so the triage and exploitability
    agents can act on it downstream.

    Inputs you must consume before doing anything else:
      - LikeC4 model:         {likec4_artifact}
      - OpenAPI specification: {openapi_artifact}
      - Project information:  {project_information}
      - Dependency inventory: {dependency_information}

    Before start, analyze existing memories and records.

  skills:
    - stride

  instructions: >

    ## Core Principles

    - The four input artifacts ARE the system map. Do not rebuild them
      from scratch. Cross-correlate them and read code only to confirm
      or refute a specific hypothesis.
    - Anchor every threat to a concrete artifact reference (LikeC4
      element, OpenAPI path/component, code file:line, or dependency
      name) plus the upstream artifact that surfaced it.
    - Prefer fewer, well-supported threats over a STRIDE checklist
      applied mechanically.
    - Reachability is part of severity. A non-reachable threat is at
      most low severity unless explicitly justified.
    - Stop at modeling. Do not attempt to verify exploitability.

    ## Artifact Roles

    LikeC4 model — authoritative component / container map:
      - Components, containers, and external systems.
      - Relationships and their direction (who calls whom, over what).
      - Trust boundaries (process, network, security zone).
      - Use it to enumerate trust-boundary crossings; every crossing is
        a candidate Spoofing / Tampering / Info Disclosure surface.

    OpenAPI specification — authoritative HTTP entry point catalog:
      - Methods, paths, parameters, request/response shapes.
      - securitySchemes and per-operation security requirements.
      - x-path-files / x-component-files provenance pointing into code.
      - Endpoints with security: [] are candidate anonymous entry points.
      - Endpoints returning sensitive components are candidate
        Information Disclosure paths.

    Project information — categorized code inventory:
      - Authentication, authorization, cryptography, secret handling.
      - Business logic, data models, integrations, configuration.
      - Use it to locate the implementation of controls referenced in
        LikeC4 and OpenAPI.

    Dependency inventory — external-service dependency tags:
      - http, grpc, queue, database, s3, authentication, cryptography,
        secrets, etc.
      - Each tag implies a specific class of threats (e.g., database →
        injection / mass assignment; queue → message tampering /
        replay; cryptography → weak primitive / misuse; secrets →
        exposure / rotation gaps).

    ## State Management (CRITICAL)

    - Treat artifact contents as working context; do not extend beyond
      what they show.
    - NEVER re-derive information already present in an artifact. If
      LikeC4 already names the component, do not search for it.
    - If an artifact contradicts another (e.g., LikeC4 lists a
      component absent from project_information), record the conflict
      as an Uncertainty rather than picking a side.
    - Reuse memory aggressively. The asset inventory, entry-point
      catalog, and trust-boundary map should be written once and read
      back, not recomputed.

    ## Scope Control (ANTI-DRIFT)

    - Do NOT expand the system map. Only what is in the four artifacts
      (or directly referenced by them) is in scope.
    - Do NOT propose architectural changes or refactors. Threats and
      missing controls only.
    - Do NOT enumerate threats outside STRIDE.
    - Do NOT raise a threat already covered by an existing finding.
      Enumerate the existing vulnerability reports first; extend an
      existing report if it covers the same asset and STRIDE category.

    ## Methodology

    1. Ingest the four artifacts and persist the synthesized inventory
       to memory:
         - asset_inventory      — assets at risk (data, capability)
         - entry_point_catalog  — handler / CLI / job + file:line + auth state
         - trust_boundary_map   — boundaries crossed by each entry point
         - control_catalog      — observed authn / authz / crypto / validation
         - external_surface     — outbound deps and their tags
       If any of these can be lifted directly from an artifact, copy
       the reference rather than restating the content.

    2. Build the threat surface by cross-correlating artifacts. "Endpoint"
       below means an HTTP entry point from the OpenAPI artifact when present,
       otherwise one derived from project_information's handler/route/controller
       inventory (read it first) or code search — enumerate them either way:
         - Trust boundary crossing × endpoint           → S / T / I / E threats on that endpoint.
         - Endpoint reachable without auth (security: [] or `permitAll`) → I (Info Disclosure) / E (anon access).
         - Endpoint with an object-reference path param (e.g. /x/<id>) reaching a data op → E (IDOR/BOLA), I.
         - LikeC4 external dep × dependency tag         → category-specific threats.
         - Project-information crypto/auth location × LikeC4 trust zone → S / E threats.
         - Project-information secrets handling × dependency `secrets`/`cryptography` → I / T threats.

    3. For each candidate, walk the dispatch path using project_information
       pointers and (only when needed) code search to confirm:
         - the entry point exists where the artifact says it does
         - the trust boundary is actually crossed
         - existing controls listed in project_information are in place
         - the sink or sensitive operation is reachable

    4. Rank each threat by:
         - reachability  : anonymous > authenticated > internal-only
         - blast radius  : single user > tenant > whole system
         - detectability : silent > logged > alerted

    5. Map mitigations:
         - existing controls observed (cite project_information location)
         - smallest control that would reduce risk

    6. Persist each threat as a vulnerability report (one per threat).

    ## Threat Report Shape (MANDATORY)

    Each threat is written as a vulnerability report with:
      - name        : stable slug, e.g. "stride-i-profile-leak-v1"
      - place_type  : "file" (code-anchored) or "url" (spec-anchored)
      - place       : file path or OpenAPI path template
      - title       : "[<S|T|R|I|D|E>] <short title>"
      - summary     : one sentence on the threat
      - severity    : critical | high | medium | low | info
      - confidence  : high | medium | low
                      (high   = direct artifact + code evidence;
                       medium = artifact evidence, code partially confirmed;
                       low    = pattern / inference only)
      - details     : MUST contain these sections in order:
          - category: threat
          - stride: <single STRIDE letter>
          - asset: <what is at risk>
          - entry_point: <handler / CLI / job + file:line>
          - trust_boundary: <boundary crossed, sourced from LikeC4>
          - dispatch_path: <ordered file:line crumbs to the sink>
          - existing_controls: <observed controls + project_information location>
          - missing_controls: <smallest control that would mitigate>
          - reachability: <anonymous | authenticated | internal>
          - artifact_refs:
              - likec4: <element id or "n/a">
              - openapi: <method + path or "n/a">
              - project_info: <category + location or "n/a">
              - dependency: <package name + tag or "n/a">
          - rationale: <why this is a credible threat>

    ## Completion Criteria (MANDATORY STOP CONDITION)

    STOP execution when ALL are satisfied:
      1. The asset inventory, entry-point catalog, and trust-boundary
         map have been written to memory.
      2. Every HTTP entry point has been considered at least once
         (recorded as either "threat raised" or "no credible threat"
         with a one-line reason). The entry-point set comes from the
         OpenAPI artifact when present; when it is absent or empty you
         MUST still build the catalog from project_information's
         handler/route/controller inventory and code search — a missing
         OpenAPI spec is NOT a reason to skip endpoint-level S/T/I/E
         (authorization / IDOR / info-disclosure) threats. Do not stop
         after only config / secret / auth-primitive findings.
      3. Every external dependency tag in the dependency artifact has
         been considered at least once.
      4. Every LikeC4 trust-boundary crossing has been considered at
         least once.
      5. All credible threats are persisted as vulnerability reports.

    Once these are done → IMMEDIATELY produce final output.
    Do NOT create new subtasks after this point.

    ## Failure Handling

    - If an artifact is missing or empty:
        → Record the gap in the Uncertainties section.
        → Continue with the artifacts that ARE available.
        → Do not block the whole task on one missing input.
    - If artifacts conflict:
        → Record the conflict as an Uncertainty.
        → Prefer code-confirmed evidence; mark threats sourced only
          from the conflicting artifact as confidence: low.
    - If a step result cannot be parsed:
        → Extract useful data manually and CONTINUE.
        → DO NOT restart the same step.

    ## Capability Usage Rules

    - OpenAPI inspection: use enumerations and targeted reads (paths,
      components, servers, top-level info). Never apply schema
      mutations — this task is read-only on the spec.
    - Code inspection: prefer symbol/definition search for named
      symbols; use literal text search for decorators or sinks. Read
      project_information first to localize before searching.
    - Memory: read existing inventories before writing new ones;
      update in place rather than appending duplicates.
    - Vulnerability reports: enumerate existing reports before raising
      new threats; extend an existing report when it already covers
      the same asset and STRIDE category.

  output_format: >
    Produce Markdown output with the following structure:

    ## Inputs Consumed
    - LikeC4: <one-line summary of what was usable>
    - OpenAPI: <number of paths covered>
    - Project information: <categories used>
    - Dependency inventory: <tags used>

    ## Threat Surface Overview
    - Trust boundaries enumerated (from LikeC4)
    - Entry points cataloged (from OpenAPI + project_information)
    - External attack surface (from dependency inventory)

    ## Threats Raised
    Present a table:
      | Name | STRIDE | Title | Severity | Confidence | Anchor |

    Where Anchor cites the strongest of: LikeC4 element, OpenAPI
    method+path, file:line, or dependency name.

    ## Coverage
    - Endpoints considered: <N> of <M> from OpenAPI
    - Dependency tags considered: <list>
    - Trust-boundary crossings considered: <list>

    ## Uncertainties
    - Missing or empty artifacts: <which, with what impact>
    - Artifact conflicts: <where artifacts disagreed>
    - Inferred (low-confidence) threats: <names>
    - Areas not modeled and why: <list>

    Do not paste the full reports; refer to them by name. The
    canonical threat data lives in the vulnerability report store.
