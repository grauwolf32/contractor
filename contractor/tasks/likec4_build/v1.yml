---
task:
  name: "LikeC4 Architecture Model Build"

  objective: >
    You are working on project {project_path}.

    Build a complete LikeC4 architecture model for this project, focused on
    security-relevant facts: external interactions, trust boundaries,
    authentication and authorization touch points, data stores and the classes
    of data they hold, secrets handling, and outbound integrations.

    The canonical LikeC4 source MUST be maintained in the overlay-backed file
    `/architecture.c4`. Write to it via write_file/edit/replace_range and
    validate it through validate_likec4(path="/architecture.c4") before
    continuing.

    The final task result MUST include the full validated content of
    `/architecture.c4` (read it back with read_file and emit verbatim).

    Inputs to consume before exploring code:
      - Project information: project_information/result
      - Dependency inventory: dependency_information/result

    Read existing memories and records first.

  skills:
    - likec4

  instructions: >

    ## Core Principles

    - The upstream artifacts `project_information/result` and
      `dependency_information/result` are the primary system map. Do not rebuild
      them from scratch. Mine them for external integrations, entry points, data
      stores, secrets handling, authentication patterns, authorization patterns,
      deployment units, and infrastructure dependencies.
    - Verify artifact findings against code before modeling them when possible.
      Prefer code evidence over artifact summaries if they conflict.
    - Anchor every modeled element and relationship to concrete evidence. If
      exact line numbers are unavailable, use the file path plus a short
      rationale.
    - The model is security-first. Treat every external system, inbound entry
      point, outbound call, data store, identity boundary, and privileged tool as
      a potential attack surface.
    - The LikeC4 source lives in a single overlay-backed file at
      `/architecture.c4`. Write to it via write_file/edit/replace_range.
      The overlay ensures your writes are visible to validate_likec4 calls
      but do not touch the real project filesystem.
    - Validate after every meaningful edit via
      validate_likec4(path="/architecture.c4"). Do not add more model content
      while validation errors remain.

    ## Required Coverage

    The final model MUST represent, at minimum:

      1. External actors
         - anonymous users
         - authenticated users
         - administrators / operators
         - third-party callers, partners, webhook senders, or automation clients

      2. Inbound entry points
         - HTTP / REST APIs, grouped by logical service
         - gRPC / RPC endpoints
         - message-queue consumers / event handlers
         - scheduled jobs / cron tasks / workers
         - CLI tools / admin tooling

      3. Internal containers
         - each deployable service, process, worker, or job
         - first-party identity, authentication, or authorization subsystems
         - internal gateways, API layers, and background processors

      4. Data stores
         - relational databases
         - document databases
         - key-value stores
         - object storage
         - caches
         - message brokers, modeled both as data stores and integrations where
           appropriate
         - secret stores / KMS
         - audit, analytics, telemetry, and log sinks

         Tag data stores with the data classes they hold:
           #pii
           #secrets
           #tokens
           #credentials
           #audit
           #business

      5. External integrations
         - identity providers: OIDC, SAML, OAuth2, LDAP, SSO
         - payment / billing providers
         - email, SMS, push, or notification providers
         - third-party APIs called by the project
         - telemetry, analytics, observability, logging, and error-reporting
           platforms
         - cloud provider services such as object storage, queues, KMS, secret
           managers, databases, and managed identity services

         Model each integration as its own element. Tag each with #external and
         protocol tags where supported by the project evidence.

      6. Trust boundaries
         - Encode trust zones using tags such as:
             #public
             #dmz
             #internal
             #admin
             #external
         - Use grouping or boundaries in the model to make trust zones visually
           clear.
         - Every relationship that crosses a trust boundary MUST name the
           crossing in its title, for example:
             "internet → DMZ over HTTPS"
             "DMZ → internal over gRPC"
             "internal → external SaaS over HTTPS w/ API key"

      7. Security-relevant relationships
         Include relationships for:
           - authentication:
               "authenticates via"
               "issues tokens"
               "validates JWT"
               "exchanges OAuth code"
           - authorization:
               "checks RBAC against"
               "evaluates policy via"
               "enforces tenant boundary"
           - cryptography and secrets:
               "fetches secrets from"
               "decrypts using KMS"
               "signs webhook with"
           - sensitive data flow:
               "stores PII"
               "persists tokens"
               "logs audit events"
               "processes payment data"
           - outbound calls:
               include protocol and credential type in the relationship title,
               for example:
                 "calls payments API over HTTPS w/ API key"
                 "publishes events over AMQP w/ service credentials"
                 "calls identity provider over HTTPS w/ OAuth client secret"

    ## Required Views

    At least these three views MUST be present:

      - `systemLandscape`
          Full system overview.
          Use `autoLayout lr`.

      - `containers`
          Internal container detail.
          Use `autoLayout lr`.

      - `security` or `external_surface`
          Security-focused view emphasizing:
            - external attack surface
            - public and admin entry points
            - identity boundaries
            - trust-zone crossings
            - stores tagged #pii, #secrets, #tokens, or #credentials

    Add additional views only when concrete evidence supports them, such as:
      - deployment views
      - authentication dynamic flows
      - webhook flow views
      - data-flow views for sensitive data

    Do not pad the model with speculative or low-value views.

    ## Subtask Decomposition

    Decompose the work into SEPARATE subtasks — one per phase. Do NOT
    combine building and verification into one subtask. Each subtask must
    do ONE thing and validate before the next starts.

    IF `/architecture.c4` does not exist (first iteration):

      Subtask 1: "Write specification block"
        Write spec with all element kinds, relationship kinds, tags, colors.
        Run validate_likec4. Fix errors until clean. STOP.

      Subtask 2: "Write model — actors, system, containers"
        Add model block with actors, system boundary, containers, services,
        data stores, external systems. Run validate_likec4. Fix errors. STOP.

      Subtask 3: "Write model — relationships"
        Add all relationships (inbound entry points, internal delegation,
        data store access, outbound calls, crypto dependencies).
        Run validate_likec4. Fix errors. STOP.

      Subtask 4: "Write views"
        Add systemLandscape, containers, security views (one at a time,
        validate after each). Add dynamic/data-flow views if evidence
        supports them. STOP.

      Subtask 5: "Verify coverage and emit result"
        Run validate_likec4 one final time. Read /architecture.c4 verbatim.
        Produce the output in the required format.

    IF `/architecture.c4` already exists (subsequent iterations):

      Subtask 1: "Gap analysis"
        Read /architecture.c4 and run validate_likec4. Compare the model
        against the required coverage checklist. List SPECIFIC gaps (not
        just "PASS" — name what is missing). STOP.

      Subtask 2..N: One subtask per gap found
        Each subtask fixes ONE gap: add missing element, fix broken
        relationship, add missing view. Validate after each. STOP.

      Final subtask: "Verify and emit result"
        Validate. Read /architecture.c4 verbatim. Produce the output.

    RULES for subtask design:
      - NEVER create a subtask that only reads the file without changing it
        (unless it is the final "emit result" subtask).
      - NEVER create a subtask that re-reads content already available from
        a previous subtask's output — use records to pass data forward.
      - NEVER combine "write spec + write model + write views" into one
        subtask. Each phase must be a separate subtask with its own
        validation step.
      - If the gap analysis finds no gaps and validation is clean, go
        directly to the "emit result" subtask. Do NOT create filler
        subtasks that just re-verify what was already checked.

    ## Workflow Details

    1. Read upstream inputs:
         - `project_information/result`
         - `dependency_information/result`

    2. Build or extend the model in THREE PHASES. After EACH phase,
       validate before proceeding to the next:

         PHASE 1 — specification block (write → validate → fix ALL errors)
              - element kinds (actor, system, container, service, database,
                queue, storage, external — declare every kind before using it)
              - relationship kinds (authenticates, calls, reads, stores, etc.)
              - tags (pii, secrets, tokens, credentials, audit, business,
                external, public, internal, admin, identity)
              - colors / styles needed for security emphasis
              Do NOT proceed to model until specification validates cleanly.

         PHASE 2 — model block (write → validate after each group → fix)
              - external actors
              - system boundary
              - internal containers (one per distinct code module / router
                that has its own security surface)
              - data stores and external systems
              - cryptographic dependencies (JWT secrets, password hashing)
              - relationships (add last; validate after adding them)

         PHASE 3 — views block (add one view at a time → validate each)
              - systemLandscape (simplest view first)
              - containers
              - security or external_surface
              - dynamic auth-flow view (if auth patterns exist)
              - additional evidence-backed views

    3. Validate after every meaningful edit via
       validate_likec4(path="/architecture.c4"). Do not add more model content
       while validation errors remain.

    4. Use the `likec4` skill memory for exact DSL syntax. Do NOT guess.

    5. Explore code evidence using targeted inspection:
         - Use symbol / definition lookup for handlers, clients, adapters,
           services, repositories, middleware, auth modules, jobs, and workers.
         - Use literal text search for route decorators, framework entry points,
           queue subscribers, event handlers, cron definitions, env-var lookups,
           config keys, outbound clients, auth middleware, and token/credential
           handling.

    6. Track coverage:
         - Record explored and unexplored areas in `likec4_uncertainties`.
         - Record uncertainty instead of inventing missing facts.

    7. Stop only when:
         - LikeC4 validation reports no errors
         - required coverage is satisfied
         - unresolved uncertainty has been recorded in `likec4_uncertainties`

    ## Capability Usage Rules

    - Code:
        Prefer precise symbol and definition lookup for handlers, clients,
        adapters, middleware, repositories, integration modules, and workers.
        Use literal search for framework syntax, route declarations, queue
        subscriptions, cron definitions, environment variables, config keys, and
        outbound client usage.

    - Memory:
        Read existing entries before writing. Use memory for findings,
        uncertainties, and coverage tracking — NOT for the DSL source.
        The canonical source is `/architecture.c4` (overlay-backed file).

    - LikeC4:
        Validate after every meaningful edit. Do not continue building while
        syntax or validation errors remain.

    - Coverage:
        Use available coverage inspection capabilities to confirm that inbound
        handlers, scheduled jobs, workers, integration adapters, and data access
        paths have been inspected.

    ## Anti-Drift Rules

    - Do NOT model internal helper functions, utility classes, DTOs, mappers, or
      library wrappers unless they are deployed or operated as independent
      containers.
    - Do NOT invent integrations, protocols, identity providers, stores, queues,
      or trust boundaries that are not supported by artifacts or code evidence.
    - Do NOT model implementation details unrelated to security, such as logging
      formatters, config parser internals, serialization helpers, or purely local
      data transformation utilities.
    - Do NOT over-model individual routes when a logical API container is more
      appropriate. Model route groups only when they represent distinct security
      surfaces.
    - Do NOT include speculative views or placeholder elements.
    - Do NOT output the full DSL in intermediate chat messages. During the task,
      the canonical source lives only in `/architecture.c4`. The full DSL is
      included only in the final task result as required by `output_format`.

    ## Failure Handling

    - LikeC4 validation errors:
        Fix syntax and model issues before adding new content.

    - Validator command or capability unavailable:
        Record the blocker in `likec4_uncertainties`, continue building the best
        possible source, and mark validation as blocked in the final result. Do
        not claim validation succeeded.

    - Missing upstream artifacts:
        Record the missing artifact in `likec4_uncertainties`, inspect code
        directly, and continue with best-effort modeling.

    - Conflicting evidence between upstream artifacts and code:
        Prefer code evidence. Record the conflict and chosen interpretation in
        `likec4_uncertainties`.

    - Insufficient evidence for a required category:
        Do not invent elements. Record what was searched, what was not found,
        and why the category is omitted or represented generically.

  output_format: >
    The final task result MUST be a single response containing a short Markdown
    summary followed by the full validated content of `/architecture.c4`.

    Use exactly this structure:

    ## Coverage
    - Containers modeled: <count> (<names>)
    - External systems modeled: <count> (<names>)
    - Data stores modeled: <count> (<names + tags>)
    - Trust boundaries encoded: <list>
    - Views produced: <list>

    ## Validation
    - Last LikeC4 validation status: ok | blocked | <N issues>
    - Outstanding warnings: <list or none>

    ## Uncertainties
    - <items left out and why, or none>

    ## LikeC4 Source

    ```likec4
    <full /architecture.c4 content>
    ```

    Do NOT paste the source twice.
    Do NOT include code excerpts beyond the LikeC4 block.
    Do NOT claim validation passed unless validate_likec4 reported success.