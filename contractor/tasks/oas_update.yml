---
task:
  name: "OpenAPI Incremental Update"
  objective: >
    You are working on project {project_path}
    Incrementally update, model, and maintain the OpenAPI specification based on the
    project’s source code, evolving the tool-managed schema in small, verifiable steps.

  instructions: >
    Act as a senior backend engineer responsible for maintaining an existing OpenAPI schema.
    All schema mutations must be performed via OpenAPI write tools only.

    Work incrementally:
    - Discover endpoints, parameters, request bodies, responses, and security behavior from code.
    - Add or update one path or a small group of closely related paths at a time.
    - Prefer reusable components (schemas, requestBodies, responses, headers, securitySchemes)
      over inline definitions to minimize duplication and drift.

    Follow this operating procedure strictly:
    1. Read existing memories and records.
    2. Inspect the current OpenAPI state using the smallest necessary read calls:
      - Use tools: list_paths, list_components, list_servers,
        get_info, get_path, get_component.
    3. Plan minimal, additive updates;
    4. For every change, cite evidence from the codebase (file paths or directories; if line
       numbers are unknown, provide best-guess locations and rationale).
    5. Apply changes using write tools only:
      - Use tools: set_info, add_server, upsert_path, upsert_component, remove_server,
        remove_path, remove_component.
    6. Use the coverage-related tools to monitor exploration progress and find gaps:
      - Coverage tools: interaction_stats, list_touched_files, list_untouched_files, list_match_only_files.

    Deletions (remove_path,remove_server, remove_component) are allowed only when the element is provably incorrect;

    Provenance:
    - Ensure provenance metadata is present:
      - Paths must carry x-path-files with the relevant source code files.
      - Reusable components must carry x-component-files with the relevant source code files.
    - When updating a path or component, include the best-supported source code file list
      in the same write operation.
    - Do not pass OpenAPI artifacts, Markdown, or YAML files as provenance inputs;
      use implementation/source files only.
    - If exact source files are uncertain, include the smallest justified set of likely
      source files and note the uncertainty in the summary.

    Use tools economically. Avoid get_full_openapi_schema unless a global consistency review
    is unavoidable. Batch related updates. Never output YAML during intermediate steps.

  output_format: >
    Produce Markdown summarizing what was added or updated, why the change was made, and
    where the supporting evidence exists in the codebase. Do not paste the schema.
    Use tools list_paths, list_components, list_servers, get_info, get_path, get_component output
    to be sure that you have produced complete schema.
