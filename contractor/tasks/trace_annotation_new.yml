task:
  name: "annotate_request_trace_for_vulnerability_analysis"

  objective: >
    Given a single OpenAPI operation, locate the request entrypoint, trace the
    relevant execution path, insert structured trace annotations, and produce
    a structured analysis of data flow and security-relevant behavior.

    Focus only on paths where request-derived data is processed, validated,
    transformed, or reaches sensitive operations.

    Target operation: {operation_id}
    Schema: {operation_schema}

  instructions: >

    ## Core Principles

    - Focus only on code relevant to the target operation
    - Follow request-derived data through the system
    - Prefer concrete, code-backed paths over speculation
    - Do not assume behavior not visible in code
    - Annotate only where it adds clear trace value

    ## Annotation Format

      # @trace target=<operation_id_or_unknown> args=<arg:state,...> calls=<symbol,...>
      # @validate arg=<arg> kind=<kind>
      # @sink kind=<kind> arg=<arg_or_unknown>

    Argument states:
      tainted   — request-derived input
      validated — explicit validation present
      clean     — trusted/internal
      derived   — computed from other values

    Only annotate based on visible code evidence.

    ## Sink Catalogue

    DATABASE:
      db.query, db.exec, db.query.raw, db.exec.raw, db.orm.bulk

    FILESYSTEM:
      filesystem.read, filesystem.write, filesystem.delete, filesystem.path.join

    PROCESS:
      shell.exec, shell.exec.args, process.env.write

    NETWORK:
      http.request, http.redirect, dns.lookup, socket.connect, smtp.send

    RENDERING:
      template.render, template.render.raw, html.render, pdf.render

    SERIALIZATION:
      parser.process, parser.yaml.unsafe, parser.pickle,
      serializer.encode, serializer.decode

    CACHE / QUEUE:
      cache.read, cache.write, queue.publish, queue.consume

    CRYPTO / SECRETS:
      crypto.key.derive, crypto.random.seed, crypto.sign, secret.log

    AUTH / AUTHZ:
      auth.token.verify, auth.token.create, authz.policy.eval,
      auth.password.check, auth.password.hash

    REFLECTION:
      reflect.eval, reflect.import, reflect.attr

    OBSERVABILITY:
      log.write, metric.record, audit.write

    IPC / INTER-SERVICE:
      grpc.call, ipc.pipe, ldap.query, xpath.query, nosql.query

    Sink → vulnerability guidance:

      db.query.raw / db.exec.raw → SQL Injection
      shell.exec → OS Command Injection / RCE
      reflect.eval → RCE
      parser.pickle → Insecure Deserialization / RCE
      parser.yaml.unsafe → Code Execution
      template.render.raw → SSTI
      http.request → SSRF
      http.redirect → Open Redirect
      filesystem.* → Path Traversal
      ldap.query → LDAP Injection
      nosql.query → NoSQL Injection
      xpath.query → XPath Injection
      smtp.send → Email Header Injection
      html.render → XSS
      auth.token.create → Privilege Escalation
      secret.log / log.write → Sensitive Data Exposure
      crypto.random.seed → Weak Randomness
      reflect.attr / db.orm.bulk → Mass Assignment

    Important:
    - db.query/db.exec (ORM/parameterized) are not SQL injection by default
    - rendering must be visible in this code path to count as XSS
    - reaching a sink alone is not a vulnerability; structure/control matters

    ## Execution Steps (MANDATORY)

    1. Identify the entrypoint:
       - Match HTTP method and path
       - Use routing decorators and framework conventions
       - Use x-path-file / x-component-file as strong hints
       - Confirm with schema structure

    2. Trace execution:
       - Start from request inputs (path, query, body, headers)
       - Follow how data propagates through function calls
       - Track transformations, validation, and sinks
       - Ignore unrelated or generic helpers
       - Stop tracing when flow becomes unclear or irrelevant

    3. Select functions to annotate:
       - entrypoint
       - functions handling request-derived data
       - validation points (explicit only)
       - sink functions or wrappers
       - key transformations needed to explain flow

    4. Insert annotations:
       - place comments directly above function definitions
       - do not duplicate or overwrite existing annotations
       - annotate only high-confidence, relevant functions

    5. Verify annotations are present

    6. Analyze business value of the operation 

    7. Security analysis:
       - identify where tainted or derived data reaches sinks
       - verify presence or absence of validation
       - only report vulnerabilities if clearly supported by code
       - avoid speculation
       - also consider: broken access control, missing auth check, insecure
        defaults, sensitive data exposure.



  output_format: |
    ## Changes Applied

    ### Files modified
    - <file>: <N> annotation block(s) inserted

    ### Annotation blocks inserted
    file: <path>  function: <name>
    @trace target=... args=... calls=...
    @validate arg=... kind=...   (if applicable)
    @sink kind=... arg=...       (if applicable)
    (repeat per function)

    ---

    ## Trace Summary

    - Entrypoint: <function> in <file>
    - Data flow:
      <param> → <fn A> → <fn B> → <fn C>
      (include arg states and sink if present)

    ---

    ## Operation Summary

    - Business purpose: <what the operation does>
    - Data handled: <input/output types, sensitivity>
    - Key transformations: <DB, external calls, serialization, etc.>

    ---

    ## Security Summary

    - Identified problems (only if supported by code)

    ---

    ## Uncertainties

    - Routing: <unclear handler resolution>
    - Call targets: <dynamic or unresolved calls>
    - Validation gaps: <possible but not visible validation>
    - Sink confidence: <uncertain sink classification>
    - Missed branches: <paths not followed>
    - Infrastructure unknowns: <auth, proxies, headers not verified>
    - Duplicate root causes deferred: <if applicable>