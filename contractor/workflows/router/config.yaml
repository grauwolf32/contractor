budgets:
  max_tokens: 120000
  max_steps: 20
agents:
  trace_agent: { with_graph_tools: true, output_format: json }
# Lean + file-paths observations (see observations A/B: lean buys vuln-detection
# recall; file paths recover precision/coverage at flat-or-lower cost).
observations:
  enabled: true
  include_tool_errors: false
  track_file_paths: true
