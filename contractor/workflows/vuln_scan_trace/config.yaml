budgets:
  scan_max_tokens: 80000
  trace_max_tokens: 80000
tasks:
  scan: { iterations: 1, max_attempts: 2, max_steps: 75 }
  trace: { iterations: 1, max_attempts: 1, max_steps: 30 }
agents:
  codereview_agent: { with_graph_tools: true, output_format: json }
  trace_agent: { with_graph_tools: true, output_format: json }
# Lean deterministic worker observations (see trace_annotation A/B: vuln-F1 lift,
# annotation unchanged; tool error counts hurt, so kept off). Workflow-global, so
# it applies to both the scan and trace tasks in this pipeline.
observations:
  enabled: true
  include_tool_errors: false
  track_file_paths: true