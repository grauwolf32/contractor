budgets:
  scan_max_tokens: 80000
  swe_max_tokens: 100000
tasks:
  dependency_information: { iterations: 1, max_attempts: 2, max_steps: 20 }
  project_information: { iterations: 1, max_attempts: 2, max_steps: 20 }
  scan: { iterations: 1, max_attempts: 2, max_steps: 50 }
agents:
  codereview_agent: { with_graph_tools: true, output_format: json }
  trace_agent: { with_graph_tools: true, output_format: json }
# Lean + file-paths observations (see observations A/B: lean buys vuln-detection
# recall; file paths recover precision/coverage at flat-or-lower cost).
observations:
  enabled: true
  include_tool_errors: false
  track_file_paths: true
