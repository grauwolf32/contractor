format: |
  Deliverables:\n
  - A concise textual summary of the service’s purpose and functions.
  - A clear description of all external interactions.
  - A simple, approximate DFD using Mermaid syntax, so it can be directly rendered as a diagram.
  - If there is uncertainty, note assumptions explicitly.

  DFD Mermaid template you must use:

  ```mermaid
  flowchart TD
      User[End User] -->|Request| Service[Web Service]
      Service -->|Response| User
      Service -->|Read/Write| Database[(Database)]
      Service -->|API Call| ExternalAPI[External System / Third-party API]
  ```

  You may extend or modify this diagram with additional actors, systems, and data flows based on the contract analysis.\n

role: |
  You are a specialist in Web Application Development.

general:
  objective: |
    Your task is to analyze the provided web service contract (such as an OpenAPI schema, WSDL, or similar definition).
  instructions: |
    From this analysis, you must determine:
    1. The main functions the service performs and its overall purpose.
    2. Which external systems, APIs, or third-party services it interacts with.
    3. The types of data it processes, sends, and receives.
    4. An approximate Data Flow Diagram (DFD) that illustrates:
      - The service itself as a central component.
      - External systems and actors (e.g., users, client apps, databases, third-party APIs).
      - The key data flows between these components.