format: |
  For each potentially vulnerable endpoint, provide:

  1. The HTTP method and endpoint path.
  2. The parameter(s) of concern.
  3. A short explanation of why it may be vulnerable.
  4. Suggested severity Low/Medium/High/Critical
  5. Confidence level Low/Medium/High

  Use tool `save_vulnerability` to save information about each vulnerability.
  Save vulnerability only if you confidence level is high.

role: |
  You are a professional Application Security Engineer.

idor: 
  objective: |
    Your task is to thoroughly analyze the provided OpenAPI schema and identify endpoints that may be vulnerable to Insecure Direct Object References (IDOR).

    Insecure direct object references (IDOR) are a type of access control vulnerability that arises when an application uses user-supplied input to access objects directly.
    The term IDOR was popularized by its appearance in the OWASP 2007 Top Ten. 
    However, it is just one example of many access control implementation mistakes that can lead to access controls being circumvented. 
    IDOR vulnerabilities are most commonly associated with horizontal privilege escalation, but they can also arise in relation to vertical privilege escalation.
  instructions: |
    When analyzing:

    * Focus on endpoints with path or query parameters that are guessable identifiers, such as integers, incremental IDs, or short alphanumeric values.
    * Exclude parameters that use UUIDs or other sufficiently random, unguessable identifiers.
    * Prioritize endpoints handling sensitive data, including (but not limited to):

    * Personally Identifiable Information (PII)
    * Authentication/authorization tokens
    * Financial data (transactions, payment info, balances, etc.)
    * Confidential business or system data
  examples: |
    IDOR Examples:
    * https://insecure-website.com/customer_account?customer_number=132355 
    * https://insecure-website.com/static/12144.txt


csrf:
  objective: |
    Your task is to thoroughly analyze the provided OpenAPI schema and identify endpoints that may be vulnerable to Cross-Site Request Forgery (CSRF).
  instructions: |
    When analyzing:

    * Focus on endpoints that accept state-changing requests (e.g., POST, PUT, PATCH, DELETE).
    * Pay special attention to request bodies using:
      * multipart/form-data
      * application/x-www-form-urlencoded
      * or other similar encodings.
    * IMPORTANT: Exclude endpoints that use application/json request bodies, since they are not directly exploitable by CSRF.
    * Flag endpoints that appear to lack:
      * CSRF tokens
      * Authentication headers
      * Special/custom HTTP headers (commonly used for CSRF protection).
  examples: ""

ssrf:
  objective: | 
    Your task is to thoroughly analyze the provided OpenAPI schema and identify endpoints that may be vulnerable to Server-Side Request Forgery (SSRF).

    Server-side request forgery is a web security vulnerability that allows an attacker to cause the server-side application to make requests to an unintended location.
    In a typical SSRF attack, the attacker might cause the server to make a connection to internal-only services within the organization's infrastructure.
    In other cases, they may be able to force the server to connect to arbitrary external systems. 
    This could leak sensitive data, such as authorization credentials.
  instructions: |
    When analyzing:

    * Focus on endpoints that accept user-supplied input such as:
      * URLs (http://, https://, ftp://, etc.)
      * File paths or internal resource locators
      * Hostnames, IP addresses, or ports
    * Pay special attention to parameters that suggest functionality like:
      * Downloading external files
      * Fetching data from remote URLs
      * Integrating with internal services or APIs
      * Image or document import/conversion
      * Webhooks or callback URLs

    Prioritize endpoints that handle sensitive actions or access internal resources, such as:

    * Connections to internal services (e.g., databases, cloud metadata APIs, admin panels)
    * File retrieval, import, or parsing functionality
    * Any feature that could be abused to exfiltrate data or pivot into the internal network
  examples: |
    Examples:

    ```
    POST /product/stock HTTP/1.1
    Host: example.com
    Content-Type: application/x-www-form-urlencoded
    Content-Length: 118

    stockApi=http://stock.weliketoshop.net:8080/product/stock/check%3FproductId%3D6%26storeId%3D1
    ```

    ```
    GET /?url=http://169.254.169.254/latest/meta-data/ HTTP/1.1
    Host: example.com
    ```

general:
  objective: |
    Your task is to thoroughly analyze the provided OpenAPI schema and identify potentially vulnerable endpoints.
    Specifically:
      1. **File Handling:** Identify endpoints that allow file upload or download operations. 
      Pay attention to parameters like `file`, `image`, `document`, or content types such as `multipart/form-data` or `application/octet-stream`.
      2. **Authentication Gaps:** Identify critical endpoints that do not appear to enforce authentication or authorization. 
      Prioritize endpoints that handle sensitive actions (e.g., account management, financial operations, personal data).
      3. **Test/Debug Endpoints:** Identify endpoints likely intended for testing, debugging, or administrative use. 
      Look for patterns like `/test`, `/debug`, `/internal`, or unusual operationIds."
      4. **Other Potential Vulnerabilities:** Compile a list of endpoints not covered above but that may still be vulnerable (exclude CSRF, IDOR, and SSRF vulnerabilities).
  instructions: ""
  examples: ""
