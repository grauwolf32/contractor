sqli-blind-boolean:
  name: sqli-blind-boolean
  place_type: file
  place: dsvw.py
  title: Blind SQL Injection via id parameter
  summary: The id query parameter is directly concatenated into a SELECT query without
    sanitization.
  severity: critical
  confidence: high
  details: 'SQL injection at dsvw.py:30. The id parameter from /?id= is concatenated
    into ''SELECT id, username, name, surname FROM users WHERE id=%s'' without parameterization.
    The query result is rendered into the HTML response. No authentication required.
    Exploitable via boolean-based blind injection: compare /?id=2 (baseline) vs /?id=2
    AND 1=1 (same result) vs /?id=2 AND 1=2 (different/empty result).'
  ordinal: 1
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
path-traversal-read:
  name: path-traversal-read
  place_type: file
  place: dsvw.py
  title: Path traversal via path parameter allows reading arbitrary files
  summary: The path query parameter is passed to open() with os.path.abspath but no
    path restriction.
  severity: medium
  confidence: high
  details: 'Path traversal at dsvw.py:37. The path parameter from /?path= is passed
    through os.path.abspath() and then to open(). While abspath normalizes the path,
    there is no check to restrict it to a safe directory. An attacker can read arbitrary
    files via /?path=../../../../../../etc/passwd. No authentication required.'
  ordinal: 2
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
cmdi-nslookup:
  name: cmdi-nslookup
  place_type: file
  place: dsvw.py
  title: OS command injection via domain parameter in nslookup
  summary: The domain parameter is concatenated into an nslookup command executed with
    shell=True.
  severity: critical
  confidence: high
  details: 'Command injection at dsvw.py:39. The domain parameter from /?domain= is
    concatenated into ''nslookup %s'' and executed via subprocess with shell=True.
    An attacker can inject arbitrary commands via /?domain=google.com;id or /?domain=google.com;sleep+5.
    No authentication required.'
  ordinal: 3
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
open-redirect:
  name: open-redirect
  place_type: file
  place: dsvw.py
  title: Open redirect via redir parameter without validation
  summary: The redir parameter value is injected into a meta refresh URL without any
    validation.
  severity: medium
  confidence: high
  details: 'Open redirect at dsvw.py:61. The redir parameter from /?redir= is injected
    directly into an HTML meta refresh tag: ''<meta http-equiv="refresh" content="0;
    url=%s">''. No URL validation is performed. An attacker can redirect users to arbitrary
    domains via /?redir=https://evil.com. No authentication required.'
  ordinal: 4
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
xss-reflected-v-param:
  name: xss-reflected-v-param
  place_type: file
  place: dsvw.py
  title: Reflected XSS via v parameter injected into HTML without escaping
  summary: The v query parameter is injected into the HTML response body via re.sub
    without output encoding.
  severity: medium
  confidence: high
  details: Reflected cross-site scripting at dsvw.py:33. The v parameter from /?v=
    is injected into the HTML page content using re.sub without any HTML entity encoding
    or sanitization. An attacker can execute arbitrary JavaScript in the victim's browser
    via /?v=<script>alert(1)</script>. No authentication required.
  ordinal: 5
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
ssrf-path-urlopen:
  name: ssrf-path-urlopen
  place_type: file
  place: dsvw.py
  title: SSRF via path parameter passed to urllib.request.urlopen
  summary: When the path parameter contains a URL scheme, it is passed directly to
    urllib.request.urlopen enabling SSRF.
  severity: high
  confidence: high
  details: 'Server-side request forgery at dsvw.py:37. When the path parameter from
    /?path= starts with a URL scheme (http://, https://, file://), it is passed to
    urllib.request.urlopen() instead of being opened as a local file. An attacker can
    make the server fetch arbitrary URLs including internal services via /?path=http://169.254.169.254/latest/meta-data/
    or read local files via /?path=file:///etc/passwd. No authentication required.'
  ordinal: 6
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
sqli-login-bypass:
  name: sqli-login-bypass
  place_type: file
  place: dsvw.py
  title: SQL injection in login form allows authentication bypass
  summary: The password parameter is concatenated directly into a WHERE clause enabling
    auth bypass.
  severity: critical
  confidence: high
  details: "SQL injection at dsvw.py:67. The password parameter from /login?password=\
    \ is concatenated directly into a SQL WHERE clause without parameterization. An\
    \ attacker can bypass authentication via /login?username=admin&password=' OR '1'='1.\
    \ The injected condition makes the WHERE clause always true, granting access without\
    \ a valid password. No authentication required."
  ordinal: 7
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
info-disclosure-users-json:
  name: info-disclosure-users-json
  place_type: file
  place: dsvw.py
  title: Unauthenticated /users.json endpoint exposes all user data
  summary: The /users.json endpoint returns all usernames and surnames without any
    authentication.
  severity: medium
  confidence: high
  details: Information disclosure at dsvw.py:65. The /users.json endpoint returns a
    JSON response containing all usernames and surnames from the database without requiring
    any authentication. An attacker can enumerate all users by simply requesting /users.json.
    This data can be used to facilitate further attacks such as credential stuffing
    or social engineering.
  ordinal: 8
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
