no-auth-get-order:
  name: no-auth-get-order
  place_type: file
  place: crapi/shop/views.py
  title: Missing authentication on order GET endpoint — any order readable without auth
  summary: GET /workshop/api/shop/orders/{order_id} has no @jwt_auth_required decorator,
    allowing unauthenticated access to any order.
  severity: high
  confidence: high
  details: 'Missing authentication on the GET method of OrderControlView at crapi/shop/views.py:109.
    The post() and put() methods have @jwt_auth_required but get() does not. Any
    unauthenticated user can read any order''s full details including product, quantity,
    price, status, and user email by accessing GET /workshop/api/shop/orders/{order_id}.
    No authentication required. Try GET /workshop/api/shop/orders/1 without any
    Authorization header.'
  ordinal: 6
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
