mass-assignment-coupon-amount:
  name: mass-assignment-coupon-amount
  place_type: file
  place: crapi/shop/views.py
  title: Mass assignment — user-supplied amount field in coupon apply credits arbitrary
    amount
  summary: POST /workshop/api/shop/apply_coupon uses the user-supplied 'amount' field
    instead of the coupon's actual value.
  severity: critical
  confidence: high
  details: 'Mass assignment at crapi/shop/views.py:427. The apply_coupon handler credits
    user_details.available_credit += coupon_request_body[''amount''] — taking the
    amount from the POST body rather than from the coupon object in MongoDB. An attacker
    can supply any arbitrary amount to add unlimited credit. Requires JWT authentication.
    The endpoint is POST /workshop/api/shop/apply_coupon with JSON body {"coupon_code":
    "TRAC_1234", "amount": 999999}. Authenticate via POST /identity/api/auth/login
    with {"email":"adam007@example.com","password":"adam007!123"} to obtain a Bearer
    token (field: "token" in response). Note: the coupon code must be valid and not
    already applied.'
  ordinal: 8
  created_at: '2026-01-01T00:00:00Z'
  updated_at: '2026-01-01T00:00:00Z'
