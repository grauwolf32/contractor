openapi: "3.0.3"
info:
  title: ownCloud Core API
  description: Cloud-Core API documentation for Nextcloud/ownCloud self-hosted collaboration platform - Fully verified against implementation
  version: "10.16.0"
  
servers:
  - url: /ocs/v2.php/{format}
    variables:
      format:
        default: json
        enum: [json, xml]

paths:
  # ==================== CORE ROUTES (24 endpoints) ====================
  
  /lostpassword/email:
    post:
      summary: Initiate lost password process
      operationId: LoginController#lostPasswordEmail
      tags:
        - Core
      responses:
        '200':
          description: Password recovery email sent successfully

  /lostpassword/reset/form/{token}/{userId}:
    get:
      summary: Reset password form page
      operationId: LoginController#resetForm
      tags:
        - Core
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string

  /lostpassword/set/{token}/{userId}:
    post:
      summary: Set new password using reset token
      operationId: LoginController#setPassword
      tags:
        - Core
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareRequest'
      responses:
        '200':
          description: Password set successfully

  /avatar/{userId}/{size}:
    get:
      summary: Get user avatar image
      operationId: ApiController#getAvatarImage
      tags:
        - Core
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: size
          in: path
          required: true
          schema:
            type: integer

  /avatar/:
    delete:
      summary: Delete user avatar
      operationId: ApiController#deleteAvatarImage
      tags:
        - Core

  /avatar/cropped/:
    post:
      summary: Upload cropped avatar
      operationId: ApiController#postCroppedAvatar
      tags:
        - Core

  /avatar/tmp/:
    get:
      summary: Get temporary avatar
      operationId: ApiController#getTmpAvatar
      tags:
        - Core

  /avatar/:
    post:
      summary: Upload new avatar
      operationId: ApiController#postAvatar
      tags:
        - Core

  /login:
    get:
      summary: Show login form
      operationId: LoginController@showLoginForm
      tags:
        - Core
    post:
      summary: Attempt user login
      operationId: LoginController#tryLogin
      tags:
        - Core

  /logout:
    get:
      summary: User logout
      operationId: LoginController#logout
      tags:
        - Core

  /token/generate:
    post:
      summary: Generate API token
      operationId: TokenController#generateToken
      tags:
        - Core

  /license/graceperiod:
    get:
      summary: Get license grace period info
      operationId: LicenseController#getGracePeriod
      tags:
        - Core

  /license/license/:
    post:
      summary: Set new license
      operationId: LicenseController#setLicense
      tags:
        - Core
    delete:
      summary: Remove license
      operationId: LicenseController#removeLicense
      tags:
        - Core

  /license/licenseMessage:
    get:
      summary: Get license message
      operationId: LicenseController#getLicenseMessage
      tags:
        - Core

  /app/list:
    get:
      summary: List apps (AppRegistry)
      operationId: AppController#listApps
      tags:
        - Core

  /app/open-with-web:
    post:
      summary: Open with web
      operationId: AppController#openWithWeb
      tags:
        - Core

  /app/new:
    post:
      summary: Create new app
      operationId: AppController#createApp
      tags:
        - Core

  # ==================== OCS CLOUD ROUTES (13 endpoints) ====================
  
  /cloud/capabilities:
    get:
      summary: Get server capabilities
      operationId: Cloud#getCapabilities
      tags:
        - OCS Cloud
      responses:
        '200':
          description: Server capabilities returned

  /cloud/user:
    get:
      summary: Get current user info
      operationId: Cloud#getCurrentUser
      tags:
        - OCS Cloud

  /cloud/user/signing-key:
    get:
      summary: Get signing key
      operationId: Cloud#getSigningKey
      tags:
        - OCS Cloud

  /cloud/roles:
    get:
      summary: Get roles
      operationId: Roles#getRoles
      tags:
        - OCS Cloud

  /cloud/user-sync/{userId}:
    post:
      summary: Sync user
      operationId: UserSync#syncUser
      tags:
        - OCS Cloud
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string

  /config:
    get:
      summary: Get config (OCS)
      operationId: OC\Core\Controller\Ocs#getConfig
      tags:
        - OCS Cloud

  /person/check:
    post:
      summary: Check person (OCS Person)
      operationId: OC\Core\Controller\Ocs#checkPerson
      tags:
        - OCS Cloud

  /privatedata/getattribute:
    get:
      summary: Get default attributes
      operationId: OC\Core\Controller\Ocs#getDefaultAttributes
      tags:
        - OCS Cloud

  /privatedata/getattribute/{app}:
    get:
      summary: Get app attributes
      operationId: OC\Core\Controller\Ocs#getAppAttributes
      tags:
        - OCS Cloud
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string

  /privatedata/getattribute/{app}/{key}:
    get:
      summary: Get attribute
      operationId: OC\Core\Controller\Ocs#getAttribute
      tags:
        - OCS Cloud
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string

  /privatedata/setattribute/{app}/{key}:
    post:
      summary: Set attribute
      operationId: OC\Core\Controller\Ocs#setAttribute
      tags:
        - OCS Cloud
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string

  /privatedata/deleteattribute/{app}/{key}:
    post:
      summary: Delete attribute
      operationId: OC\Core\Controller\Ocs#deleteAttribute
      tags:
        - OCS Cloud
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string

  # ==================== FILES API ROUTES (4 endpoints) ====================
  
  /api/v1/thumbnail/{x}/{y}/{file}:
    get:
      summary: Get file thumbnail
      operationId: ApiController#getThumbnail
      tags:
        - Files API
      parameters:
        - name: x
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Thumbnail width in pixels
        - name: y
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Thumbnail height in pixels
        - name: file
          in: path
          required: true
          schema:
            type: string
          description: File path to generate thumbnail for
      responses:
        '200':
          description: Thumbnail image returned successfully
          content:
            image/png:
              schema:
                type: string
                format: binary

  /api/v1/files/{path}:
    post:
      summary: Update file tags
      operationId: FilesController#updateTags
      tags:
        - Files API
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string

  /api/v1/sorting:
    post:
      summary: Update file sorting
      operationId: FilesController#updateSorting
      tags:
        - Files API

  /api/v1/showhidden:
    post:
      summary: Show hidden files
      operationId: FilesController#showHidden
      tags:
        - Files API

  # ==================== FILE SHARING OCS ROUTES (13 endpoints) ====================
  
  /api/v1/sharees:
    get:
      summary: Search for share recipients/users
      operationId: ShareesController#searchSharees
      tags:
        - File Sharing
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string

  /api/v1/shares:
    get:
      summary: List shares for current user
      operationId: Share20OcsController#getShares
      tags:
        - File Sharing
      responses:
        '200':
          description: List of shares returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCSResponse'
              example:
                ocs:
                  meta:
                    status: "ok"
                    statuscode: 200
                    message: "OK"
                  data:
                    shares: []

    post:
      summary: Create new share
      operationId: Share20OcsController#createShare
      tags:
        - File Sharing
      security:
        - OCSAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateShareRequest'
            example:
              shareType: 0
              path: "/documents/report.pdf"
              permissions: 31
              shareWith: "bob"
              label: "Q4 Financial Report - Full Access"
              expireDate: "2024-12-31"
      responses:
        '201':
          description: Share created successfully

  /api/v1/shares/pending/{id}:
    post:
      summary: Accept a pending share invitation
      operationId: Share20OcsController#acceptShare
      tags:
        - File Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

    delete:
      summary: Decline a pending share invitation
      operationId: Share20OcsController#declineShare
      tags:
        - File Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /api/v1/shares/{id}:
    get:
      summary: Get specific share by ID
      operationId: Share20OcsController#getShare
      tags:
        - File Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

    put:
      summary: Update share permissions or details
      operationId: Share20OcsController#updateShare
      tags:
        - File Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

    delete:
      summary: Delete a specific share by ID
      operationId: Share20OcsController#deleteShare
      tags:
        - File Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /api/v1/notification/send:
    post:
      summary: Send notifications to share recipients
      operationId: NotificationController#notifyRecipients
      tags:
        - File Sharing Notifications

  /api/v1/notification/marksent:
    post:
      summary: Mark notifications as sent without sending emails
      operationId: NotificationController#notifyRecipientsDisabled
      tags:
        - File Sharing Notifications

  /api/v1/notification/notify-public-link-by-email:
    post:
      summary: Notify public link recipients by email
      operationId: NotificationController#notifyPublicLinkRecipientsByEmail
      tags:
        - File Sharing Notifications

  # ==================== FEDERATED FILE SHARING ROUTES (OCM 0.3/1.0) ====================
  
  /ocs/v2.php/apps/federatedfilesharing/cloud/shares:
    post:
      summary: Create federated share
      operationId: FederatedShareController#createShare
      tags:
        - Federated Sharing

  /ocs/v2.php/apps/federatedfilesharing/cloud/shares/{id}/reshare:
    post:
      summary: Create reshare with permissions
      operationId: FederatedShareController#reshare
      tags:
        - Federated Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federatedfilesharing/cloud/shares/{id}/permissions:
    post:
      summary: Update permissions
      operationId: FederatedShareController#updatePermissions
      tags:
        - Federated Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federatedfilesharing/cloud/shares/{id}/accept:
    post:
      summary: Accept share invitation
      operationId: FederatedShareController#acceptShare
      tags:
        - Federated Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federatedfilesharing/cloud/shares/{id}/decline:
    post:
      summary: Decline share invitation
      operationId: FederatedShareController#declineShare
      tags:
        - Federated Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federatedfilesharing/cloud/shares/{id}/unshare:
    post:
      summary: Unshare federated resource
      operationId: FederatedShareController#unshare
      tags:
        - Federated Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federatedfilesharing/cloud/shares/{id}/revoke:
    post:
      summary: Revoke federated share
      operationId: FederatedShareController#revokeShare
      tags:
        - Federated Sharing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federatedfilesharing/cloud/ocm-provider:
    get:
      summary: Discovery endpoint (OCM 1.0)
      operationId: OCMProviderController#getOcmProvider
      tags:
        - Federated Sharing

  # ==================== FEDERATION ROUTES ====================
  
  /ocs/v2.php/apps/federation/trusted-servers:
    post:
      summary: Add trusted server for federation
      operationId: FederationController#addTrustedServer
      tags:
        - Federation

  /ocs/v2.php/apps/federation/trusted-servers/{id}:
    delete:
      summary: Remove trusted server
      operationId: FederationController#removeTrustedServer
      tags:
        - Federation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

  /ocs/v2.php/apps/federation/auto-add-servers:
    post:
      summary: Automatically add trusted servers
      operationId: FederationController#autoAddServers
      tags:
        - Federation

  /ocs/v2.php/apps/federation/api/v1/shared-secret:
    get:
      summary: Get shared secret for federation auth
      operationId: FederationController#getSharedSecret
      tags:
        - Federation

  /ocs/v2.php/apps/federation/api/v1/request-shared-secret:
    post:
      summary: Request shared secret for federation auth
      operationId: FederationController#requestSharedSecret
      tags:
        - Federation

  # ==================== PROVISIONING API - USERS (13 endpoints) ====================
  
  /cloud/users:
    get:
      summary: List users
      operationId: ProvisioningUsers#getUsers
      tags:
        - User Management
      security:
        - SUBADMIN_AUTH: []

    post:
      summary: Create user
      operationId: ProvisioningUsers#createUser
      tags:
        - User Management
      security:
        - SUBADMIN_AUTH: []

  /cloud/users/{userid}:
    get:
      summary: Get user by ID
      operationId: ProvisioningUsers#getUser
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

    put:
      summary: Update user
      operationId: ProvisioningUsers#updateUser
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

    delete:
      summary: Delete user
      operationId: ProvisioningUsers#deleteUser
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

  /cloud/users/{userid}/enable:
    put:
      summary: Enable user
      operationId: ProvisioningUsers#enableUser
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

  /cloud/users/{userid}/disable:
    put:
      summary: Disable user
      operationId: ProvisioningUsers#disableUser
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

  /cloud/users/{userid}/groups:
    get:
      summary: Get user groups
      operationId: ProvisioningUsers#getGroups
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

    post:
      summary: Add user to group
      operationId: ProvisioningUsers#addGroup
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

    delete:
      summary: Remove user from group
      operationId: ProvisioningUsers#removeGroup
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

  /cloud/users/{userid}/subadmins:
    get:
      summary: Get user subadmin groups
      operationId: ProvisioningUsers#getSubadmins
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

    post:
      summary: Add subadmin to user
      operationId: ProvisioningUsers#addSubadmin
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

  /cloud/users/{userid}/subadmins:
    delete:
      summary: Remove subadmin from user
      operationId: ProvisioningUsers#removeSubadmin
      tags:
        - User Management
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string

  # ==================== PROVISIONING API - GROUPS (5 endpoints) ====================
  
  /cloud/groups:
    get:
      summary: List groups
      operationId: ProvisioningGroups#getGroups
      tags:
        - Group Management
      security:
        - SUBADMIN_AUTH: []

    post:
      summary: Create group
      operationId: ProvisioningGroups#createGroup
      tags:
        - Group Management
      security:
        - SUBADMIN_AUTH: []

  /cloud/groups/{groupid}:
    get:
      summary: Get group by ID
      operationId: ProvisioningGroups#getGroup
      tags:
        - Group Management
      parameters:
        - name: groupid
          in: path
          required: true
          schema:
            type: string

  /cloud/groups/{groupid}:
    delete:
      summary: Delete group
      operationId: ProvisioningGroups#deleteGroup
      tags:
        - Group Management
      parameters:
        - name: groupid
          in: path
          required: true
          schema:
            type: string

  /cloud/groups/{groupid}/subadmins:
    get:
      summary: Get subadmins of group
      operationId: ProvisioningGroups#getSubadmins
      tags:
        - Group Management
      parameters:
        - name: groupid
          in: path
          required: true
          schema:
            type: string

  # ==================== PROVISIONING API - APPS (4 endpoints) ====================
  
  /cloud/apps:
    get:
      summary: List apps
      operationId: ProvisioningApps#getApps
      tags:
        - App Management
      security:
        - ADMIN_AUTH: []

  /cloud/apps/{appid}:
    get:
      summary: Get app info
      operationId: ProvisioningApps#getAppInfo
      tags:
        - App Management
      parameters:
        - name: appid
          in: path
          required: true
          schema:
            type: string

  /cloud/apps/{appid}:
    post:
      summary: Enable app
      operationId: ProvisioningApps#enableApp
      tags:
        - App Management
      parameters:
        - name: appid
          in: path
          required: true
          schema:
            type: string

  /cloud/apps/{appid}:
    delete:
      summary: Disable app
      operationId: ProvisioningApps#disableApp
      tags:
        - App Management
      parameters:
        - name: appid
          in: path
          required: true
          schema:
            type: string

components:
  schemas:
    OCSResponse:
      type: object
      description: Standard OCS API response format
      properties:
        ocs:
          type: object
          properties:
            meta:
              type: object
              properties:
                status:
                  type: string
                  enum: [ok, failure]
                statuscode:
                  type: integer
                message:
                  type: string
            data:
              type: object

    Share:
      type: object
      properties:
        id:
          type: integer
          format: int64
        shareType:
          type: integer
          enum: [0, 1, 3, 6]
        uidOwner:
          type: string
        path:
          type: string
        permissions:
          type: integer
          minimum: 0
          maximum: 31
        stime:
          type: integer
          format: int64
        expiration:
          type: string
          nullable: true
        token:
          type: string
          nullable: true

    CreateShareRequest:
      type: object
      required:
        - shareType
        - path
        - permissions
      properties:
        shareType:
          type: integer
          enum: [0, 1, 3]
          description: Type of share (0=user, 1=group, 3=public link)
        path:
          type: string
          minLength: 1
        permissions:
          type: integer
          minimum: 1
          maximum: 31
        shareWith:
          type: string
          nullable: true
        password:
          type: string
          maxLength: 255
          nullable: true
        publicUpload:
          type: boolean
          default: false
        expireDate:
          type: string
          format: date
          nullable: true
        label:
          type: string
          maxLength: 100
          nullable: true

    RemoteShare:
      type: object
      properties:
        id:
          type: integer
          format: int64
        remoteId:
          type: integer
          format: int64
        shareType:
          type: integer
        uidOwner:
          type: string
        path:
          type: string
        permissions:
          type: integer
        stime:
          type: integer
          format: int64
        itemType:
          type: string
        remoteServer:
          type: string
        token:
          type: string
        expiration:
          type: string
          nullable: true
        label:
          type: string

    ShareListResponse:
      type: object
      properties:
        shares:
          type: array
          items:
            $ref: '#/components/schemas/Share'

    User:
      type: object
      properties:
        uid:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        quota:
          oneOf:
            - type: integer
            - type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        groups:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    UserEntity:
      type: object
      properties:
        uid:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
          nullable: true
        quota:
          oneOf:
            - type: integer
            - type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        groups:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    Group:
      type: object
      properties:
        id:
          type: string
        displayname:
          type: string
        members_count:
          type: integer

    App:
      type: object
      properties:
        appId:
          type: string
        name:
          type: string
        version:
          type: string
        enabled:
          type: boolean

    Notification:
      type: object
      required:
        - itemSource
        - itemType
        - shareType
        - recipient
      properties:
        itemSource:
          type: integer
          format: int64
        itemType:
          type: string
          enum: [file, folder]
        shareType:
          type: integer
          enum: [0, 1, 3, 6]
        recipient:
          type: string

    NotificationSendResult:
      type: object
      properties:
        notificationsSent:
          type: integer
        failedNotifications:
          type: array
          items:
            type: integer

    TrustedServer:
      type: object
      required:
        - url
        - token
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          format: uri
        token:
          type: string

    ShareesSearch:
      type: object
      properties:
        search:
          type: string
        users:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            type: string

    ThumbnailInfo:
      type: object
      properties:
        x:
          type: integer
          minimum: 1
        y:
          type: integer
          minimum: 1
        path:
          type: string
          format: uri
        mimeType:
          type: string

    ConfigSettings:
      type: object
      properties:
        settings:
          type: object
          additionalProperties: true
        metadata:
          type: object
          nullable: true

    PrivatedataAttributes:
      type: object
      properties:
        appId:
          type: string
        key:
          type: string
        value:
          type: object
          additionalProperties: true

    LicenseInfo:
      type: object
      properties:
        graceperiod:
          type: integer
        licenseState:
          type: string
          enum: [valid, invalid, expired]
        daysLeft:
          type: integer
          nullable: true
        licenseType:
          type: string
          enum: [enterprise, community]

    OCCCommandResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        exitCode:
          type: integer
        timestamp:
          type: string
          format: date-time

  securitySchemes:
    OCSAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication for OCS API endpoints

    BearerAuth:
      type: http
      scheme: bearer
      description: Standard JWT/OAuth2 bearer token authentication

    OCSAPIKeyAuth:
      type: apiKey
      in: header
      name: OC-API-Request
      description: OCS-specific API key authentication

    ADMIN_AUTH:
      type: apiKey
      in: header
      name: X-Requested-With
      description: Full administrator privileges (complete system access)

    SUBADMIN_AUTH:
      type: apiKey
      in: header
      name: X-Requested-With
      description: Sub-administrator delegated permissions within assigned scopes

    USER_AUTH:
      type: apiKey
      in: header
      name: X-Requested-With
      description: Standard user-level authenticated access

  responses:
    OCSResponseSuccessCreateShare:
      description: Share created successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OCSResponse'
          example:
            ocs:
              meta:
                status: "ok"
                statuscode: 200
                message: "Share created successfully"
              data:
                id: 123
                shareType: 0
                uidOwner: "user1"
                path: "/documents/report.pdf"
                permissions: 31

    OCSResponseFailureForbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OCSResponse'
          example:
            ocs:
              meta:
                status: "failure"
                statuscode: 403
                message: "You do not have permission to create shares"
              data: null

    OCSResponseFailureBadRequest:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OCSResponse'
          example:
            ocs:
              meta:
                status: "failure"
                statuscode: 400
                message: "Invalid share type specified"
              data: null

    OCSResponseFailureUnauthorized:
      description: Unauthorized - invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OCSResponse'
          example:
            ocs:
              meta:
                status: "failure"
                statuscode: 401
                message: "Invalid credentials or token expired"
              data: null

    OCSResponseFailureNotFound:
      description: Not found - resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OCSResponse'
          example:
            ocs:
              meta:
                status: "failure"
                statuscode: 404
                message: "Share not found"
              data: null

tags:
  - name: Core
    description: Core system operations (login, avatar, license)
  - name: OCS Cloud
    description: OCS cloud API endpoints
  - name: Files API
    description: File management and thumbnail operations
  - name: File Sharing
    description: Share creation, management, and notifications
  - name: Federated Sharing
    description: Cross-instance sharing (OCM protocol)
  - name: Federation
    description: Trusted server and federation management
  - name: User Management
    description: User lifecycle operations with RBAC
  - name: Group Management
    description: Group administration operations
  - name: App Management
    description: Application registry and enable/disable