/rest/user/reset-password:
  post:
    description: Reset user password using security question verification. Requires
      email, answer (security question answer), new password and repeat for confirmation.
    operationId: resetUserPassword
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                type: string
                format: email
                description: User's email address
              answer:
                type: string
                description: Answer to the user's security question (HMAC signed)
              new:
                type: string
                format: password
                minLength: 1
                description: New password
              repeat:
                type: string
                format: password
                description: Repeat of new password for confirmation
            required:
            - email
            - answer
            - new
            - repeat
            description: Request schema for password reset via security question
            x-component-files:
            - /juice-shop/routes/resetPassword.ts
      required: true
  responses:
    '200':
      content:
        application/json:
          schema:
            properties:
              user:
                type: object
                properties:
                  id:
                    type: integer
                    description: Unique user identifier
                  email:
                    type: string
                    format: email
                    description: User's email address
                  role:
                    type: string
                    enum:
                    - customer
                    - admin
                    - accounting
                    description: User's role in the system
                  password:
                    type: string
                    description: User's password (stored as hash, never returned in responses)
                  name:
                    type: string
                    description: User's full name
                  language:
                    type: string
                    description: User's preferred language code
                  securityQuestion:
                    type: string
                    description: Security question for account recovery
                  securityAnswer:
                    type: string
                    description: Answer to security question (stored as hash)
                  totpSecret:
                    type: string
                    description: TOTP secret key for two-factor authentication
                  balance:
                    type: number
                    format: float
                    description: User's wallet balance in account currency
                x-component-files:
                - /juice-shop/models/user.ts
                description: User schema containing user account information and authentication
                  details
                required:
                - email
                - password
            type: object
        description: Password reset successful
    '401':
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum:
                - error
                description: Error status
              message:
                type: string
                enum:
                - Blocked illegal activity by [IP]
                - Password cannot be empty.
                - New and repeated password do not match.
                - Wrong answer to security question.
                description: Human-readable error message
            x-component-files:
            - /juice-shop/routes/resetPassword.ts
      description: Invalid email, wrong security answer, or password mismatch
    '500':
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error type identifier
              message:
                type: string
                description: Human-readable error message describing the server error
              requestId:
                type: string
                description: Unique request identifier for tracking and debugging (optional)
            required:
            - error
            - message
            description: Standardized error response for 500 Internal Server Error status
            x-component-files:
            - /juice-shop/server.ts
      description: Internal server error
    summary: Reset user password via security question
    tags:
    - User Management
  x-path-files:
  - /juice-shop/routes/resetPassword.ts
  - /juice-shop/server.ts