          description: Twitter/X profile URL
        facebookUrl:
          type: string
          description: Facebook page URL
        slackUrl:
          type: string
          description: Slack workspace URL
        redditUrl:
          type: string
          description: Reddit community URL
        pressKitUrl:
          type: string
          description: Press kit download URL
        nftUrl:
