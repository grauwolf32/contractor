    UpdateUserProfileRequest:
      properties:
        language:
          description: User's preferred language code (e.g., 'en', 'de')
          type: string
        securityAnswer:
          description: New answer to security question (stored as hash)
          type: string
        securityQuestionId:
          description: ID of new security question for account recovery
          format: integer
          minimum: 1
          type: integer
        username:
          description: User's display name/username
          type: string
      required: []
      type: object
      x-component-files:
      - /juice-shop/routes/updateUserProfile.ts
