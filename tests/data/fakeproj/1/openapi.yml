info:
  title: OWASP Juice Shop API
  x-framework: Express.js
  x-code-language: JavaScript
servers:
- url: http://localhost:3000
  description: Development server
- url: https://staging-juiceshop.example.com
  description: Staging environment
- url: https://api.juiceshop.example.com
  description: Production environment
components:
  securitySchemes:
    jwtBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token authentication for /api endpoints
      in: header
      name: Authorization
      x-component-files:
      - /juice-shop/server.ts
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Cookie-based authentication for /rest endpoints
      x-component-files:
      - /juice-shop/server.ts
    totp:
      type: apiKey
      scheme: custom
      description: Time-based One-Time Password (TOTP) authentication for 2FA. This
        security scheme requires a one-time password generated by an authenticator
        app (e.g., Google Authenticator, Authy). The TOTP code must be provided in
        the X-TOTP-Code header during 2FA-enabled authentication flows.
      oneTimePassword:
        type: string
        description: The one-time password generated by the authenticator app
      x-component-files:
      - /juice-shop/routes/2fa.ts
      - /juice-shop/server.ts
      name: X-TOTP-Code
      in: header
  schemas:
    TwoFactorAuthSetupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address for 2FA setup
        password:
          type: string
          format: password
          minLength: 8
          description: User's current password for confirmation
        setupToken:
          type: string
          description: JWT token containing the TOTP secret from status endpoint
        initialToken:
          type: string
          description: First TOTP code generated by authenticator app
      required:
      - password
      - setupToken
      - initialToken
      description: Request schema for 2FA setup endpoint
      x-component-files:
      - /juice-shop/routes/2fa.ts
    TwoFactorAuthVerifyRequest:
      type: object
      properties:
        totpToken:
          type: string
          minLength: 6
          maxLength: 8
          pattern: ^[0-9]+$
          description: One-time password token generated by authenticator app
      required:
      - totpToken
      description: Request schema for verifying two-factor authentication token
      x-component-files:
      - /juice-shop/api/2fa.ts
    TwoFactorAuthStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether two-factor authentication is currently enabled for
            the user
        secret:
          type: string
          description: The current 2FA secret key (shown only when 2FA is not yet
            enabled)
        qrCode:
          type: string
          description: Base64-encoded QR code image for setting up authenticator app
      description: Response schema for two-factor authentication status
      x-component-files:
      - /juice-shop/api/2fa.ts
    TwoFactorAuthDisableRequest:
      type: object
      properties:
        password:
          type: string
          format: password
          minLength: 8
          description: User's current password for confirmation
      required:
      - password
      description: Request schema for disabling 2FA endpoint
      x-component-files:
      - /juice-shop/routes/2fa.ts
    TwoFactorAuthErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message describing what went wrong
        code:
          type: string
          description: Error code for programmatic handling
        details:
          type: object
          description: Additional error details if available
      required:
      - error
      description: Error response schema for two-factor authentication operations
      x-component-files:
      - /juice-shop/api/2fa.ts
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address for authentication
        password:
          type: string
          format: password
          minLength: 1
          description: User's password for authentication
      required:
      - email
      - password
      description: Request schema for user login
      x-component-files:
      - /juice-shop/routes/login.ts
      - /juice-shop/test/api/loginApiSpec.ts
    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
        answer:
          type: string
          description: Answer to the user's security question (HMAC signed)
        new:
          type: string
          format: password
          minLength: 1
          description: New password
        repeat:
          type: string
          format: password
          description: Repeat of new password for confirmation
      required:
      - email
      - answer
      - new
      - repeat
      description: Request schema for password reset via security question
      x-component-files:
      - /juice-shop/routes/resetPassword.ts
    ChangePasswordResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
          description: Updated user object after successful password change
      x-component-files:
      - /juice-shop/routes/changePassword.ts
    User:
      type: object
      properties:
        id:
          type: integer
          description: Unique user identifier
        email:
          type: string
          format: email
          description: User's email address
        role:
          type: string
          enum:
          - customer
          - admin
          - accounting
          description: User's role in the system
        password:
          type: string
          description: User's password (stored as hash, never returned in responses)
        name:
          type: string
          description: User's full name
        language:
          type: string
          description: User's preferred language code
        securityQuestion:
          type: string
          description: Security question for account recovery
        securityAnswer:
          type: string
          description: Answer to security question (stored as hash)
        totpSecret:
          type: string
          description: TOTP secret key for two-factor authentication
        balance:
          type: number
          format: float
          description: User's wallet balance in account currency
      x-component-files:
      - /juice-shop/models/user.ts
      description: User schema containing user account information and authentication
        details
      required:
      - email
      - password
    PasswordResetErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
          description: Error status
        message:
          type: string
          enum:
          - Blocked illegal activity by [IP]
          - Password cannot be empty.
          - New and repeated password do not match.
          - Wrong answer to security question.
          description: Human-readable error message
      x-component-files:
      - /juice-shop/routes/resetPassword.ts
    Basket:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the basket, auto-incremented
        UserId:
          type: integer
          nullable: true
          description: User ID associated with this basket
        coupon:
          type: string
          nullable: true
          description: Coupon code applied to this basket
      required:
      - id
      description: Basket entity representing a user's shopping cart
      x-component-files:
      - /juice-shop/models/basket.ts
    BasketItem:
      type: object
      properties:
        id:
          type: integer
          description: Unique identifier for the basket item, auto-incremented
        BasketId:
          type: integer
          description: ID of the basket this item belongs to
        ProductId:
          type: integer
          description: ID of the product in this basket item
        quantity:
          type: integer
          description: Quantity of the product
      required:
      - id
      - BasketId
      - ProductId
      - quantity
      description: BasketItem entity representing a product within a user's shopping
        cart
      x-component-files:
      - /juice-shop/models/basketitem.ts
    CouponResponse:
      type: object
      properties:
        discount:
          type: integer
          description: Discount percentage if coupon is valid
        message:
          type: string
          description: Success or error message
      required:
      - discount
      description: Response from applying a coupon to a basket
      x-component-files:
      - /juice-shop/routes/coupon.ts
    BasketItemRequest:
      type: object
      properties:
        ProductId:
          type: integer
          description: ID of the product to add
        quantity:
          type: integer
          description: Quantity of the product
      required:
      - ProductId
      - quantity
      description: Request body for adding a basket item
      x-component-files:
      - /juice-shop/routes/basketItems.ts
    BasketResponse:
      type: object
      properties:
        id:
          type: integer
        UserId:
          type: integer
          nullable: true
        coupon:
          type: string
          nullable: true
      required:
      - id
      description: Basket entity with products
      x-component-files:
      - /juice-shop/models/basket.ts
    BasketItemAddRequest:
      type: object
      properties:
        ProductId:
          type: integer
          description: ID of the product to add
        BasketId:
          type: integer
          description: ID of the user's basket
        quantity:
          type: integer
          description: Quantity of the product
          minimum: 1
      required:
      - ProductId
      - BasketId
      - quantity
      description: Request body for adding a basket item
      x-component-files:
      - /juice-shop/routes/basketItems.ts
    CouponSuccessResponse:
      type: object
      description: Successful coupon application response
      properties:
        discount:
          type: integer
          description: Discount percentage applied to basket
          example: 15
          minimum: 0
      required:
      - discount
      x-component-files:
      - /juice-shop/server.ts
      - /juice-shop/routes/coupon.ts
    InvalidCouponError:
      type: object
      description: Error response for invalid coupon code
      properties:
        message:
          type: string
          description: Human-readable error message
          example: Invalid coupon.
      required:
      - message
      x-component-files:
      - /juice-shop/routes/coupon.ts
    Order:
      type: object
      properties:
        orderId:
          description: Unique order identifier
          type: string
        email:
          description: Customer email (masked with asterisks)
          type: string
        products:
          description: List of products in the order
          items:
            $ref: '#/components/schemas/ProductItem'
          type: array
        totalPrice:
          description: Total price including delivery and after discounts
          format: float
          type: number
        bonus:
          description: Bonus points earned from this order
          type: integer
        deliveryPrice:
          description: Delivery cost
          format: float
          type: number
        eta:
          description: Estimated time of arrival in days
          type: string
        paymentId:
          description: Payment method identifier (e.g., 'wallet')
          nullable: true
          type:
          - string
          - 'null'
        addressId:
          description: Delivery address identifier
          nullable: true
          type:
          - string
          - 'null'
        delivered:
          description: Whether the order has been delivered
          type: boolean
        basketId:
          type: string
          description: Unique identifier for the basket this order was placed from
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          description: List of items in the order
        totalAmount:
          type: number
          format: float
          description: Total order amount after discounts and delivery charges
        shippingAddress:
          type: object
          $ref: '#/components/schemas/ShippingAddress'
          description: Delivery address for this order
        paymentMethod:
          type: string
          enum:
          - wallet
          - credit_card
          - paypal
          - crypto
          description: Payment method used for the order
      required:
      - basketId
      - items
      - totalAmount
      - shippingAddress
      - paymentMethod
      x-component-files:
      - /juice-shop/routes/order.ts
      description: Order schema containing order details and fulfillment information
    Delivery:
      type: object
      properties:
        id:
          description: Unique delivery method identifier
          type: integer
        name:
          description: Name of the delivery method
          type: string
        price:
          description: Standard price for this delivery method
          format: float
          type: number
        deluxePrice:
          description: Deluxe member price for this delivery method
          format: float
          type: number
        eta:
          description: Estimated time of arrival in days
          type: integer
        icon:
          description: Icon identifier for the delivery method
          type: string
      required:
      - id
      - name
      - price
      - deluxePrice
      - eta
      x-component-files:
      - juice-shop/routes/delivery.ts
    ProductItem:
      type: object
      properties:
        quantity:
          description: Quantity of this product in the order
          type: integer
        id:
          description: Product identifier
          type: string
        name:
          description: Product name
          type: string
        price:
          description: Price per unit
          format: float
          type: number
        total:
          description: Total price for this line item (quantity × price)
          format: float
          type: number
        bonus:
          description: Bonus points earned from this product
          type: integer
      required:
      - quantity
      - id
      - name
      - price
      - total
      - bonus
      x-component-files:
      - juice-shop/routes/order.ts
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Product name
        description:
          type: string
          description: Product description
        price:
          type: number
          format: float
          description: Product price in account currency
        deletedAt:
          type:
          - string
          - 'null'
        image:
          type: string
          description: URL or path to product image
        category:
          type: string
          description: Product category classification
        stock:
          type: integer
          minimum: 0
          description: Available stock quantity
      required:
      - name
      - price
      x-component-files:
      - /juice-shop/models/product.ts
      description: Product schema containing product catalog information
    CaptchaResponse:
      type: object
      properties:
        captchaId:
          type: integer
          description: Unique identifier for the CAPTCHA session
        captcha:
          type: string
          description: Mathematical expression to solve (e.g., '3*5+2')
      required:
      - captchaId
      - captcha
      description: Response from math-based CAPTCHA generation endpoint
      x-component-files:
      - /juice-shop/routes/captcha.ts
    ImageCaptchaResponse:
      type: object
      properties:
        image:
          type: string
          format: base64
          description: SVG image data encoded as base64 string
        answer:
          type: string
          description: The text answer to the CAPTCHA challenge
      required:
      - image
      - answer
      description: Response from image-based CAPTCHA generation endpoint (requires
        authentication)
      x-component-files:
      - /juice-shop/routes/imageCaptcha.ts
    SecurityQuestionResponse:
      type: object
      properties:
        question:
          type: string
          description: The security question text associated with the user account
      required:
      - question
      description: Response containing security question for password reset verification.
        Returns empty object if email not found.
      x-component-files:
      - /juice-shop/routes/securityQuestion.ts
    PrivateKeyRequest:
      type: object
      properties:
        privateKey:
          type: string
          description: Ethereum private key in hex format (0x prefixed)
          pattern: ^0x[a-fA-F0-9]{64}$
          example: '0x5bcc3e9d38baa06e7bfaab80ae5957bbe8ef059e640311d7d6d465e6bc948e3e'
      required:
      - privateKey
      description: Request body for submitting Ethereum private key
      x-component-files:
      - /juice-shop/routes/checkKeys.ts
    WalletAddressRequest:
      type: object
      properties:
        walletAddress:
          type: string
          description: Ethereum wallet address in hex format (0x prefixed)
          pattern: ^0x[a-fA-F0-9]{40}$
          example: '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb'
      required:
      - walletAddress
      description: Request body for wallet-related operations requiring address verification
      x-component-files:
      - /juice-shop/routes/nftMint.ts
      - /juice-shop/routes/web3Wallet.ts
    ChallengeStatusResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Whether the NFT unlock challenge has been solved
      required:
      - status
      description: Response indicating the status of the NFT unlock challenge
      x-component-files:
      - /juice-shop/routes/checkKeys.ts
    ChallengeStatus:
      type: object
      properties:
        nftUnlockChallenge:
          $ref: '#/components/schemas/ChallengeStatusDetail'
        nftMintChallenge:
          $ref: '#/components/schemas/ChallengeStatusDetail'
      description: Object containing status details for Web3-related challenges
      x-component-files:
      - /juice-shop/models/challenge.ts
    ChallengeStatusDetail:
      type: object
      properties:
        solved:
          type: boolean
          description: Whether the challenge has been solved
      required:
      - solved
      description: Details of a specific Web3 challenge status
      x-component-files:
      - /juice-shop/models/challenge.ts
    NftUnlockStatusResponse:
      type: object
      properties:
        status:
          type: boolean
          description: Whether the NFT unlock challenge has been solved
      required:
      - status
      description: Response for checking NFT unlock challenge status
      x-component-files:
      - /juice-shop/routes/checkKeys.ts
    B2BOrderRequest:
      description: B2B customer order request body
      properties:
        cid:
          description: Customer ID - unique identifier for B2B customer
          example: JS0815DE
          type: string
        orderLinesData:
          description: Order line(s) in customer-specific JSON format - can be used
            for custom order processing
          example: '[{"productId": 12, "quantity": 10000, "customerReference": ["PO0000001.2",
            "SM20180105|042"], "couponCode": "pes[Bh.u*t"},{"productId": 13, "quantity":
            2000, "customerReference": "PO0000003.4"}]'
          type: string
        orderLines:
          description: Array of order line items
          items:
            $ref: '#/components/schemas/B2BOrderLine'
          type: array
        paymentMethodId:
          example: card_123
          type: string
      required:
      - cid
      type: object
      x-component-files:
      - juice-shop/routes/b2bOrder.ts
    B2BOrderLine:
      description: A single line item in a B2B order
      properties:
        customerReference:
          description: Customer's purchase order reference or coupon code
          example: PO0000001
          type: string
        productId:
          description: Product identifier
          example: 8
          minimum: 1
          type: integer
        quantity:
          description: Quantity of items ordered
          example: 500
          minimum: 1
          type: integer
      required:
      - productId
      - quantity
      type: object
      x-component-files:
      - juice-shop/routes/b2bOrder.ts
    B2BOrderResponse:
      description: B2B order confirmation response
      properties:
        cid:
          description: Customer ID that was processed
          example: JS0815DE
          type: string
        orderNo:
          description: Unique order number generated for this B2B order
          example: 3d06ac5e1bdf39d26392f8100f124742
          type: string
        paymentDue:
          description: Payment due date - 14 days from order placement, in ISO 8601
            format
          example: '2018-01-19T00:00:00.000Z'
          format: date-time
          type: string
      required:
      - cid
      - orderNo
      - paymentDue
      type: object
      x-component-files:
      - juice-shop/routes/b2bOrder.ts
    ChatbotStatusResponse:
      description: Chatbot status response indicating availability and user information
      properties:
        body:
          description: Message from the chatbot or status indicator
          type: string
        status:
          description: Training state of the chatbot (true = ready, false = not ready)
          type: boolean
        token:
          description: Updated JWT token after username change
          type: string
      required:
      - body
      - status
      type: object
      x-component-files:
      - juice-shop/routes/chatbot.ts
    ChatbotQueryRequest:
      description: Chatbot query request body
      properties:
        action:
          description: Action type - 'query' for sending a message or 'setname' to
            set username
          enum:
          - query
          - setname
          type: string
        query:
          description: User's query text when action is 'query', or new username when
            action is 'setname'
          type: string
      required:
      - action
      type: object
      x-component-files:
      - juice-shop/routes/chatbot.ts
    ChatbotQueryResponse:
      description: Chatbot response after processing a query
      properties:
        action:
          description: Action type - 'response' for chatbot reply, 'namequery' when
            username not set
          enum:
          - response
          - namequery
          type: string
        body:
          description: Response body from the chatbot or greeting message
          type: string
      required:
      - action
      - body
      type: object
      x-component-files:
      - juice-shop/routes/chatbot.ts
    FileUploadResponse:
      description: File upload endpoint responses
      properties:
        error:
          description: Error message if file upload fails or is deprecated
          type: string
      required: []
      type: object
      x-component-files:
      - juice-shop/routes/fileUpload.ts
    MetricsInfo:
      description: Information about available Prometheus metrics
      properties:
        app_version_info:
          description: Release version info with major, minor, patch labels
          type: gauge
        challenges_solved:
          description: Number of solved challenges by difficulty and category
          labels:
          - difficulty
          - category
          type: gauge
        cheat_score:
          description: Overall probability that hacking/coding challenges were solved
            by cheating
          type: gauge
        orders_placed_total:
          description: Total number of orders placed in the application
          type: gauge
        user_social_interactions:
          description: Number of social interactions (reviews, feedback, complaints)
            by type
          labels:
          - type
          type: gauge
      required: []
      type: object
      x-component-files:
      - juice-shop/routes/metrics.ts
    BadRequestError:
      type: object
      properties:
        error:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message describing what went wrong
        details:
          type: object
          description: Additional validation details or field-specific errors
          additionalProperties: true
      required:
      - error
      - message
      description: Standardized error response for 400 Bad Request status
      x-component-files:
      - /juice-shop/server.ts
    UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message describing authentication failure
        code:
          type: string
          description: Machine-readable error code for programmatic handling
      required:
      - error
      - message
      description: Standardized error response for 401 Unauthorized status
      x-component-files:
      - /juice-shop/server.ts
    ForbiddenError:
      type: object
      properties:
        error:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message describing access denial reason
        reason:
          type: string
          description: Specific reason why access was denied
      required:
      - error
      - message
      description: Standardized error response for 403 Forbidden status
      x-component-files:
      - /juice-shop/server.ts
    NotFoundError:
      type: object
      properties:
        error:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message describing missing resource
        resource:
          type: string
          description: Type of resource that was not found (optional)
      required:
      - error
      - message
      description: Standardized error response for 404 Not Found status
      x-component-files:
      - /juice-shop/server.ts
    InternalServerError:
      type: object
      properties:
        error:
          type: string
          description: Error type identifier
        message:
          type: string
          description: Human-readable error message describing the server error
        requestId:
          type: string
          description: Unique request identifier for tracking and debugging (optional)
      required:
      - error
      - message
      description: Standardized error response for 500 Internal Server Error status
      x-component-files:
      - /juice-shop/server.ts
    Error:
      type: object
      description: Standard error response schema used across all API endpoints for
        consistent error handling
      properties:
        statusCode:
          type: integer
          description: HTTP status code indicating the type of error
        message:
          type: string
          description: Human-readable description of the error
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
          description: Array of field-specific validation errors (if any)
        errorType:
          type: string
          enum:
          - VALIDATION_ERROR
          - AUTHENTICATION_ERROR
          - AUTHORIZATION_ERROR
          - NOT_FOUND_ERROR
          - INTERNAL_SERVER_ERROR
          description: Categorization of the error type
      required:
      - statusCode
      - message
      - errorType
      x-component-files:
      - /juice-shop/lib/errorHandler.ts
    FieldError:
      type: object
      description: Represents a single field-level validation error
      properties:
        field:
          type: string
          description: Name of the field with validation error
        message:
          type: string
          description: Validation error message for this field
      required:
      - field
      - message
      x-component-files:
      - /juice-shop/lib/errorHandler.ts
    OrderItem:
      type: object
      description: Represents a single item in an order
      properties:
        productId:
          type: integer
          description: ID of the product
        productName:
          type: string
          description: Name of the product
        quantity:
          type: integer
          minimum: 1
          description: Quantity ordered
        unitPrice:
          type: number
          format: float
          description: Unit price at time of order
      required:
      - productId
      - productName
      - quantity
      - unitPrice
      x-component-files:
