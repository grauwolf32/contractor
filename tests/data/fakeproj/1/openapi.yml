        endpoint. All fields are optional.
    UserDataExportResponse:
      properties:
        confirmation:
          description: Confirmation message for data export
          type: string
        userData:
          $ref: '#/components/schemas/UserDataExportContent'
          description: Structured user data export content
      required:
      - userData
      - confirmation
      type: object
      x-component-files:
      - /juice-shop/routes/dataExport.ts
      description: Response schema for POST /rest/user/data-export endpoint. Returns
        structured user data including orders, reviews, and memories for privacy compliance.
    UserDataExportContent:
      properties:
        email:
          description: User's email address
          type: string
        memories:
          description: Array of user memories with image URLs and captions
          items:
            properties:
              caption:
                type: string
              imageUrl:
                type: string
            required:
            - imageUrl
            - caption
            type: object
          type: array
        orders:
          description: Array of order history with order IDs, prices, products, bonus
            points, and ETA
          items:
            properties:
              bonus:
                format: float
                type: number
              eta:
                type: string
              orderId:
                type: string
              products:
                items:
                  $ref: '#/components/schemas/ProductItem'
                type: array
              totalPrice:
                format: float
                type: number
            required:
            - orderId
            - totalPrice
            - products
            - bonus
            - eta
            type: object
          type: array
        reviews:
          description: Array of user reviews with message, author, product ID, likes
            count, and liked by list
          items:
            properties:
              author:
                type: string
              likesCount:
                format: integer
                type: number
              likedBy:
                type: string
              message:
                type: string
              productId:
                format: integer
                type: number
            required:
            - message
            - author
            - productId
            - likesCount
            - likedBy
            type: object
          type: array
        username:
          description: User's display name
          type: string
      required:
      - email
      - orders
      - reviews
      - memories
      type: object
      x-component-files:
      - /juice-shop/routes/dataExport.ts
      description: Structured content of user data export for privacy compliance.
        Contains username, email, orders array, reviews array, and memories array.
    ProductReview:
      type: object
      properties:
        id:
          type: integer
          description: Unique review identifier
        product:
          type: integer
          description: ID of the product being reviewed
        message:
          type: string
          description: Review message content
        author:
          type: string
          description: Author name or email
        likesCount:
          type: integer
          format: integer
          minimum: 0
          description: Number of likes the review has received
        likedBy:
          type: array
          items:
            type: string
            format: email
          description: List of user emails who have liked this review
      required:
      - product
      - message
      - author
      description: Product review schema for reviews collection
      x-component-files:
      - /juice-shop/routes/showProductReviews.ts
      - /juice-shop/routes/createProductReviews.ts
    Feedback:
      description: Customer feedback entry
      properties:
        comment:
          type: string
        rating:
          maximum: 5
          minimum: 1
          type: integer
      required:
      - comment
      - rating
      type: object
      x-component-files:
      - juice-shop/server.ts
    Complaint:
      description: Customer complaint report
      properties:
        comment:
          type: string
        orderId:
          type: string
      required:
      - comment
      type: object
      x-component-files:
      - juice-shop/server.ts
    DeliveryMethod:
      description: Available delivery method
      properties:
        cost:
          type: number
        deliveryTime:
          type: string
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name
      type: object
      x-component-files:
      - juice-shop/server.ts
    Quantity:
      description: Product quantity record for inventory management
      properties:
        ProductId:
          type: integer
          description: Reference to the product
        id:
          type: integer
          description: Unique identifier for the quantity record
          autoIncrement: true
        quantity:
          type: integer
          description: Current stock quantity
          validate:
            isInt: true
        limitPerUser:
          type:
          - integer
          - 'null'
          description: Maximum units per user purchase, null if unlimited
      required:
      - ProductId
      - id
      - quantity
      type: object
      x-component-files:
      - juice-shop/models/quantity.ts
    DeluxeMembershipRequest:
      type: object
      properties:
        UserId:
          type: integer
          description: User ID for the upgrade request
        paymentMode:
          type: string
          enum:
          - wallet
          - card
          description: Payment mode - 'wallet' to deduct from wallet balance, 'card'
            to use saved card
        paymentId:
          type: integer
          nullable: true
          description: Card ID when paymentMode is 'card', required for card payments
      required:
      - UserId
      - paymentMode
      description: 'Request body for upgrading to deluxe membership. Cost: 49 units.'
      x-component-files:
      - /juice-shop/routes/deluxe.ts
    DeluxeMembershipStatusResponse:
      type: object
      properties:
        membershipCost:
          type: integer
          description: Current cost to upgrade to deluxe membership (49 units)
        status:
          type: string
          enum:
          - success
          - error
          description: Response status indicator
        data:
          type: object
          properties:
            membershipCost:
              type: integer
          description: Deluxe membership information for customers
      description: Response schema for checking deluxe membership eligibility and
        cost
      x-component-files:
      - /juice-shop/routes/deluxe.ts
    WalletBalanceResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
          - error
          description: Response status indicator
        data:
          type: integer
          description: Current wallet balance for the authenticated user
      required:
      - status
      description: Response schema for retrieving wallet balance. Returns 404 if no
        wallet exists.
      x-component-files:
      - /juice-shop/routes/wallet.ts
    ApplicationVersionResponse:
      type: object
      properties:
        version:
          type: string
          description: Application version string if showVersionNumber is enabled,
            empty string otherwise
      required:
      - version
      description: Response schema for GET /rest/admin/application-version endpoint
        containing the application version information.
      x-component-files:
      - /juice-shop/routes/appVersion.ts
    ApplicationConfigurationResponse:
      type: object
      properties:
        application:
          $ref: '#/components/schemas/ApplicationConfig'
        description: Complete application configuration object containing all system
          settings and feature flags
      required:
      - application
      description: Response schema for GET /rest/admin/application-configuration endpoint
        containing comprehensive application configuration data.
      x-component-files:
      - /juice-shop/server.ts
    ApplicationConfig:
      type: object
      properties:
        name:
          type: string
