      description: Social media and external link configuration for the application.
      x-component-files:
      - /juice-shop/server.ts
paths:
  /api/rest/two-factor-authentication/setup:
    post:
      summary: Enable two-factor authentication
      description: Initiates the setup process for two-factor authentication. Returns
        a QR code and secret key for authenticator app configuration.
      operationId: setupTwoFactorAuth
      tags:
      - Two-Factor Authentication
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorAuthSetupRequest'
      responses:
        '200':
          description: 2FA setup initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorAuthStatusResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    x-path-files:
    - /juice-shop/api/2fa.ts
  /api/rest/two-factor-authentication/verify:
    post:
      summary: Verify two-factor authentication token
      description: Verifies a one-time password token generated by an authenticator
        app. Used after successful login to complete 2FA setup.
      operationId: verifyTwoFactorAuth
      tags:
      - Two-Factor Authentication
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorAuthVerifyRequest'
      responses:
        '200':
          description: 2FA token verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorAuthStatusResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    x-path-files:
    - /juice-shop/api/2fa.ts
  /api/rest/two-factor-authentication/status:
    post:
      summary: Check two-factor authentication status
      description: Retrieves the current 2FA status for the authenticated user, including
        whether 2FA is enabled and the current secret/QR code if not yet configured.
      operationId: checkTwoFactorAuthStatus
      tags:
      - Two-Factor Authentication
      security:
      - cookieAuth: []
      responses:
        '200':
          description: 2FA status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorAuthStatusResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    x-path-files:
    - /juice-shop/api/2fa.ts
  /api/rest/two-factor-authentication/disable:
    post:
      summary: Disable two-factor authentication
      description: Disables two-factor authentication for the authenticated user.
        Requires password verification to prevent unauthorized account access.
      operationId: disableTwoFactorAuth
      tags:
      - Two-Factor Authentication
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorAuthDisableRequest'
      responses:
        '200':
          description: 2FA disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorAuthStatusResponse'
        '400':
          description: Invalid request or password mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    x-path-files:
    - /juice-shop/api/2fa.ts
  /rest/user/login:
    post:
      operationId: loginUser
      tags:
      - Authentication
      summary: Authenticate user with email and password
      description: 'Authenticates a user using email and password credentials. Returns
        a JWT token and basket ID upon successful authentication.


        When a user has 2FA enabled but hasn''t verified it yet, returns status ''totp_token_required''
        requiring the user to complete 2FA verification.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials or account locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUnauthorizedResponse'
        '400':
          description: Invalid request - missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
      security: []
    x-path-files:
    - juice-shop/routes/login.ts
  /rest/2fa/verify:
    post:
      operationId: verifyTwoFactorToken
      tags:
      - Two-Factor Authentication
      summary: Verify TOTP token after initial login
      description: Verifies the time-based one-time password (TOTP) for users with
        2FA enabled. This endpoint is called when a user has 2FA configured and needs
        to complete authentication after providing valid credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorAuthVerifyRequest'
      responses:
        '200':
          description: Successful TOTP verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid or expired token
      security: []
    x-path-files:
    - /juice-shop/routes/2fa.ts
  /rest/2fa/disable:
    post:
      operationId: disableTwoFactor
      tags:
      - Two-Factor Authentication
      summary: Disable 2FA for current user
      description: Disables two-factor authentication for the authenticated user.
        Requires password confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorAuthDisableRequest'
      responses:
        '200':
          description: Successfully disabled 2FA
        '401':
          description: Invalid password
      security:
      - cookieAuth: []
    x-path-files:
    - /juice-shop/routes/2fa.ts
  /rest/user/change-password:
    get:
      operationId: changeUserPassword
      tags:
      - Authentication
      summary: Change password for authenticated user
      description: Allows an authenticated user to change their password. Requires
        the current password for verification along with the new password and its
        confirmation.
      parameters:
      - in: query
        name: current
        schema:
          type: string
        required: false
        description: Current password for verification
      - in: query
        name: new
        schema:
          type: string
          format: password
        required: true
        description: New password
      - in: query
        name: repeat
        schema:
          type: string
        required: true
        description: Repeat of new password for confirmation
      responses:
        '200':
          description: Successfully changed password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        '401':
          description: Invalid current password or missing parameters
      security:
      - bearerAuth: []
    x-path-files:
    - /juice-shop/routes/changePassword.ts
  /rest/basket/:id:
    get:
      operationId: retrieveBasket
      tags:
      - Baskets & Items
      summary: Retrieve basket by ID
      description: 'Retrieves a shopping basket by its unique identifier. Returns
        the basket entity including associated products.


        Security: Requires valid session cookie authentication.'
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of the basket
      responses:
        '200':
          description: Successful retrieval of basket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
        '401':
          description: Unauthorized - Invalid or missing session cookie
        '404':
          description: Basket not found with specified ID
      security:
      - cookieAuth: []
    x-path-files:
    - juice-shop/routes/basketItems.ts
    patch:
      description: Update the quantity of an item in the basket
      operationId: updateBasketItemQuantity
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Basket identifier
      requestBody:
        content:
          application/json:
            schema:
              properties:
                productId:
                  type: integer
                quantity:
                  type: integer
              type: object
          description: Product ID and new quantity
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasketItem'
          description: Basket item updated successfully
        '400':
          description: Invalid quantity or product not found
        '401':
          description: Unauthorized - Invalid session cookie
        '404':
          description: Basket or basket item not found
      security:
      - cookieAuth: []
      summary: Update basket item quantity
      tags:
      - Baskets & Items
    delete:
      description: Remove an item from the basket or clear the entire basket
      operationId: removeFromBasketOrClear
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Basket identifier
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
          description: Item removed or basket cleared successfully
        '401':
          description: Unauthorized - Invalid session cookie
        '404':
          description: Basket not found
      security:
      - cookieAuth: []
      summary: Remove item from basket or clear basket
      tags:
      - Baskets & Items
  /api/BasketItems:
    post:
      operationId: addBasketItem
      tags:
      - Baskets & Items
      summary: Add basket item(s) to user's basket
      description: Add one or more products to the authenticated user's shopping cart.
        Requires JWT authentication.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        description: Array of basket items to add
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/BasketItemAddRequest'
              minItems: 1
      responses:
        '200':
          description: Basket item(s) successfully added
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/BasketItem'
        '400':
          description: Invalid request - out of stock or quantity limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid basket ID or unauthorized
      parameters: []
    x-path-files:
    - juice-shop/routes/basketItems.ts
    - juice-shop/server.ts
  /api/BasketItems/{id}:
    put:
      operationId: updateBasketItem
      tags:
      - Baskets & Items
      summary: Update basket item quantity
      description: Update the quantity of a specific basket item in the authenticated
        user's shopping cart. Requires JWT authentication.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        description: Updated basket item data
        content:
          application/json:
            schema:
              type: object
              properties:
                BasketId:
                  type: integer
                  description: ID of the user's basket
                quantity:
                  type: integer
                  description: New quantity of the product
                  minimum: 1
              required:
              - quantity
      responses:
        '200':
          description: Basket item successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasketItem'
        '400':
          description: Invalid request - out of stock or quantity limit exceeded
        '401':
          description: Unauthorized or invalid basket ID
        '404':
          description: Basket item not found
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: ID of the basket item to update
    x-path-files:
    - juice-shop/routes/basketItems.ts
    - juice-shop/server.ts
  /rest/basket/{id}/coupon/{coupon}:
    put:
      operationId: applyCouponToBasket
      tags:
      - Baskets & Items
      summary: Apply coupon to basket
      description: Applies a valid discount coupon to the specified basket. Returns
        the discount percentage if the coupon is valid, or 404 if invalid.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Basket ID
      - name: coupon
        in: path
        required: true
