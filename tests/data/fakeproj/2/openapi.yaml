openapi: "3.0.3"
info:
  title: ownCloud Core API Documentation
  x-framework: ownCloud PHP
  x-code-language: PHP
components:
  schemas:
    AppsListResponse:
      type: object
      properties:
        ocs:
          type: object
          properties:
            meta:
              $ref: '#/components/schemas/MetaData'
            data:
              type: array
              items:
                $ref: '#/components/schemas/AppInfo'
        required:
        - ocs
    MetaData:
      description: Metadata about the API response
      properties:
        statuscode:
          type: integer
        statusmessage:
          type: string
        apiversion:
          type: string
        message:
          type: string
      required:
      - statuscode
      title: MetaData
      type: object
    AppInfo:
      description: Information about an installed application
      properties:
        appid:
          type: string
        name:
          type: string
        version:
          type: string
        type:
          type: string
        namespace:
          type: string
        licence:
          type: string
        author:
          type: string
        description:
          type: string
        active:
          type: boolean
      required:
      - appid
      title: AppInfo
      type: object
    StandardSuccessResponse:
      description: Standard success response for API operations
      properties:
        statuscode:
          type: integer
        statusmessage:
          type: string
      required:
      - statuscode
      title: StandardSuccessResponse
      type: object
    CreateUserRequest:
      description: Request schema for creating a new user
      properties:
        password:
          type: string
          description: User password
        displayname:
          type: string
          description: User display name
        email:
          type: string
          format: email
          description: User email address
      required:
      - password
      - displayname
      title: CreateUserRequest
      type: object
    CreateShareRequest:
      description: Request schema for creating a new file share
      properties:
        path:
          type: string
          description: Path to the item to share
        shareType:
          type: integer
          enum:
          - 0
          - 1
          - 3
          - 4
          - 6
          description: Type of share (user, group, link, federated)
        permissions:
          type: integer
          default: 1
          description: Share permissions bitmask
        name:
          type: string
          description: Custom name for the share
      required:
      - path
      - shareType
      title: CreateShareRequest
      type: object
    ShareResponse:
      description: Response schema for share details
      properties:
        id:
          type: string
        path:
          type: string
        shareType:
          type: integer
        permissions:
          type: integer
        name:
          type: string
        uidOwner:
          type: string
        stime:
          type: integer
          format: unixtime
      required:
      - id
      - path
      title: ShareResponse
      type: object
    UpdateShareRequest:
      description: Request schema for updating an existing share
      properties:
        permissions:
          type: integer
          description: New share permissions bitmask
        password:
          type: string
          description: Password protection for the share
      title: UpdateShareRequest
      type: object
    ErrorResponse:
      description: Standard error response schema
      properties:
        error:
          type: string
        errorCode:
          type: string
        message:
          type: string
      required:
      - error
      - errorCode
      - message
      title: ErrorResponse
      type: object
    SharesListResponse:
      description: Response schema for listing shares
      properties:
        ocs:
          properties:
            data:
              items:
                $ref: '#/components/schemas/Share'
              type: array
            meta:
              $ref: '#/components/schemas/MetaData'
          required:
          - meta
          - data
          type: object
      required:
      - ocs
      title: SharesListResponse
      type: object
    FederatedShareResponse:
      type: object
      description: Response object for federated share operations
      properties:
        token:
          type: string
          description: Share token
        remoteId:
          type: integer
          format: int32
          description: Remote server ID
    TrustServerRequest:
      type: object
      description: Request body for adding a trusted federation server
      properties:
        server:
          type: string
          format: uri
          description: Federation server URL
        shareType:
          type: string
          enum:
          - user
          - group
          description: Type of share allowed
    AcceptShareResponse:
      type: array
      description: List of accepted shares with state and mountpoint
      items:
        type: object
        properties:
          state:
            type: integer
            enum:
            - 1
            description: 'Share state: STATE_ACCEPTED'
          file_target:
            type: string
            description: The mountpoint path
    TagResponse:
      type: object
      properties:
        id:
          type: integer
          description: Unique tag ID
        name:
          type: string
          description: Tag name
        color:
          type: string
          description: Tag color hex code
        userVisible:
          type: boolean
          description: Whether tag is visible to users
        userAssignable:
          type: boolean
          description: Whether users can assign this tag
    FilterSearchRequest:
      type: object
      properties:
        search:
          type: string
          description: Search query string
        filters:
          type: object
          properties:
            systemtag:
              type: array
              items:
                type: string
            favorite:
              type: boolean
    FilterSearchResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/MetaData'
          description: Search results - list of files matching filters
    UserUpdateResult:
      description: Response schema for user update operation
      properties:
        statuscode:
          type: integer
        statusmessage:
          type: string
      required:
      - statuscode
      title: UserUpdateResult
      type: object
    UserGroupsResponse:
      description: Response schema for user groups endpoint
      properties:
        ocs:
          properties:
            meta:
              properties:
                status:
                  type: string
                statuscode:
                  type: integer
                message:
                  type: string
              type: object
            data:
              items:
                type: string
              type: array
              description: List of group names the user belongs to
          required:
          - meta
          - data
          type: object
      title: UserGroupsResponse
      type: object
    AddSubAdminRequest:
      description: Request schema for adding a user as subadmin of a group
      properties:
        groupid:
          description: The group ID to make the user a subadmin of
          type: string
      required:
      - groupid
      title: AddSubAdminRequest
      type: object
    QuotaResponse:
      description: Response schema for user quota information
      properties:
        used:
          type: string
          description: Used storage in bytes
        free:
          type: string
          description: Available free storage in bytes
        definition:
          type: string
          description: Quota definition (e.g., '10 GB', 'unlimited', 'default')
      required:
      - used
      - free
      - definition
      title: QuotaResponse
      type: object
    SharesResponse:
      description: Response schema for listing shares
      properties:
        ocs:
          properties:
            data:
              items:
                $ref: '#/components/schemas/Share'
              type: array
            meta:
              $ref: '#/components/schemas/MetaData'
          required:
          - meta
          - data
          type: object
      required:
      - ocs
      title: SharesResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    TrustedServer:
      description: Schema for trusted federation server information
      properties:
        server:
          format: uri
          type: string
        shareType:
          enum:
          - 0
          - 1
          - 3
          - 4
          type: integer
        status:
          enum:
          - ok
          - pending
          - failure
          type: string
      required:
      - server
      - shareType
      title: TrustedServer
      type: object
      x-component-files:
      - cloud-core/apps/federation/lib/Controller/SettingsController.php
    SharedSecret:
      description: Schema for shared secret information used in federation
      properties:
        id:
          type: string
        name:
          type: string
        server:
          format: uri
          type: string
      required:
      - id
      - name
      - server
      title: SharedSecret
      type: object
      x-component-files:
      - cloud-core/apps/federation/lib/Controller/OCSAuthAPIController.php
    Share:
      description: Schema for share information
      properties:
        id:
          type: string
        path:
          type: string
        shareType:
          type: integer
        permissions:
          type: integer
        name:
          type: string
      required:
      - id
      - path
      title: Share
      type: object
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    User:
      type: object
      description: Represents a user in ownCloud system with basic properties and
        attributes.
      properties:
        id:
          type: string
          description: Unique identifier for the user
        displayname:
          type: string
          description: Display name of the user
        email:
          type: string
          format: email
          description: Email address of the user
        quota:
          $ref: '#/components/schemas/QuotaResponse'
          description: User quota information
        groups:
          type: array
          items:
            type: string
          description: List of groups the user belongs to
        enabled:
          type: boolean
          description: Whether the user account is enabled
        lastLogin:
          type: integer
          format: unixtime
          description: Unix timestamp of last login
      required:
      - id
      - displayname
      x-component-files:
      - /cloud-core/core/ocs-provider/index.php
    Capabilities:
      type: object
      description: Represents ownCloud server capabilities and features available
        to clients.
      properties:
        core:
          $ref: '#/components/schemas/CoreCapabilities'
        files_sharing:
          $ref: '#/components/schemas/SharingCapabilities'
        files_versions:
          type: boolean
          description: File versions support
        notifications:
          $ref: '#/components/schemas/NotificationsCapabilities'
      required:
      - core
      x-component-files:
      - /cloud-core/core/version.php
    CoreCapabilities:
      type: object
      description: Core server capabilities including poll interval, WebDAV root path,
        and version information. These properties describe the fundamental server
        configuration and status available to clients.
      properties:
        pollinterval:
          type: integer
          description: Polling interval in milliseconds for long-polling connections
            (e.g., notifications)
          example: 30000
        webdav-root:
          type: string
          format: uri
          description: Base path for WebDAV operations
          example: remote.php/webdav
        status:
          $ref: '#/components/schemas/CoreStatus'
          description: Server status information including version details
      required:
      - pollinterval
      - webdav-root
      - status
      x-component-files:
      - cloud-core/lib/private/OCS/CoreCapabilities.php
    CoreStatus:
      type: object
      description: Server status information including version details and edition
        type. This provides clients with information about the ownCloud server version,
        build, and edition.
      properties:
        version:
          type: string
          description: Version number in semantic format (e.g., '10.16.0.0')
          example: 10.16.0.0
        versionstring:
          type: string
          description: Human-readable version string
          example: 10.16.0
        edition:
          type: string
          description: Product edition (e.g., 'Community', 'Enterprise')
          example: Community
        productname:
          type: string
          description: Product name identifier
          example: ownCloud
        supported-dav-protocols:
          type: array
          items:
            type: string
          description: List of supported WebDAV protocols
          example:
          - http://webdav.org/collections/
          - http://apache.org/davs/
      required:
      - version
      - versionstring
      - edition
      - productname
      x-component-files:
      - cloud-core/lib/private/OCS/CoreCapabilities.php
    SharingCapabilities:
      type: object
      description: File sharing capabilities and configuration options. This schema
        describes all aspects of the file sharing system including API availability,
        public link settings, user/group sharing permissions, and resharing controls.
      properties:
        api_enabled:
          type: boolean
          description: Whether the file sharing API is enabled
          example: true
        public:
          $ref: '#/components/schemas/PublicSharingSettings'
          description: Configuration for public link sharing
        user:
          $ref: '#/components/schemas/UserSharingSettings'
          description: Configuration for user-to-user sharing permissions
        group:
          $ref: '#/components/schemas/GroupSharingSettings'
          description: Configuration for group-based sharing settings
        resharing:
          $ref: '#/components/schemas/ResharingSettings'
          description: Configuration for resharing capabilities and restrictions
      required:
      - api_enabled
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    PublicSharingSettings:
      type: object
      description: Configuration settings for public link sharing, including password
        requirements, upload capabilities, and expiration policies.
      properties:
        can_edit:
          type: boolean
          description: Whether public links can edit shared files
          example: false
        can_upload:
          type: boolean
          description: Whether public links allow file uploads
          example: true
        alias_enabled:
          type: boolean
          description: Whether alias URLs are supported for public shares
          example: false
        password:
          $ref: '#/components/schemas/PublicPasswordSettings'
          description: Password protection settings for public links
      required:
      - can_edit
      - can_upload
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    PublicPasswordSettings:
      type: object
      description: Password protection settings for public link shares, including
        whether passwords are required and minimum length requirements.
      properties:
        enforced_for_read_only:
          type: boolean
          description: Whether password is enforced for read-only public links
          example: false
        enforced_for_public:
          type: boolean
          description: Whether password is enforced for all public shares
          example: true
        min_length:
          type: integer
          description: Minimum password length requirement
          example: 8
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    UserSharingSettings:
      type: object
      description: Configuration for user-to-user sharing permissions, including default
        permission levels and allowed share types.
      properties:
        default_permissions:
          type: integer
          description: Default permission bitmask for user shares
          example: 1
        supports_resharing:
          type: boolean
          description: Whether users can reshare files shared with them
          example: true
        check_recipient:
          type: boolean
          description: Whether to check if recipient exists before sharing
          example: false
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    GroupSharingSettings:
      type: object
      description: Configuration for group-based sharing settings, including default
        permissions and resharing controls.
      properties:
        default_permissions:
          type: integer
          description: Default permission bitmask for group shares
          example: 1
        supports_resharing:
          type: boolean
          description: Whether groups can reshare files shared with them
          example: true
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    ResharingSettings:
      type: object
      description: Configuration for resharing capabilities and restrictions, including
        whether files can be reshared by users who received them.
      properties:
        default:
          type: boolean
          description: Whether resharing is allowed by default for all shares
          example: true
        user:
          type: boolean
          description: Whether users can reshare files shared with them
          example: true
        group:
          type: boolean
          description: Whether groups can reshare files shared with them
          example: true
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    UserUpdateRequest:
      description: Request schema for updating user information
      properties:
        displayname:
          type: string
          description: User display name
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          description: New password
      title: UserUpdateRequest
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    BadRequestResponse:
      description: Error response for 400 Bad Request - Invalid request parameters
      properties:
        error:
          type: string
          description: Error type identifier
        errorCode:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
      - error
      - errorCode
      - message
      title: BadRequestResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    ConflictResponse:
      description: Error response for 409 Conflict - Resource conflict (e.g., user
        already exists)
      properties:
        error:
          type: string
          description: Error type identifier
        errorCode:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
      - error
      - errorCode
      - message
      title: ConflictResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    NotFoundResponse:
      description: Error response for 404 Not Found - Resource does not exist
      properties:
        error:
          type: string
          description: Error type identifier
        errorCode:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
      required:
      - error
      - errorCode
      - message
      title: NotFoundResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    PaginationParams:
      properties:
        page:
          default: 1
          description: Page number (1-indexed)
          minimum: 1
          type: integer
        per_page:
          default: 25
          description: Number of items per page
          maximum: 100
          minimum: 1
          type: integer
      title: Pagination query parameters
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    UsersListResponse:
      description: Paginated list of users response
      properties:
        ocs:
          $ref: '#/components/schemas/OCSMeta'
        data:
          items:
            $ref: '#/components/schemas/User'
          type: array
      title: UsersListResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    GroupsListResponse:
      description: Paginated list of groups response
      properties:
        ocs:
          $ref: '#/components/schemas/OCSMeta'
        data:
          items:
            type: string
          type: array
      title: GroupsListResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    TagsListResponse:
      description: Paginated list of tags response
      properties:
        ocs:
          $ref: '#/components/schemas/OCSMeta'
        data:
          items:
            type: string
          type: array
      title: TagsListResponse
      type: object
      x-component-files:
      - cloud-core/core/ajax/tags.php
    TrustedServersListResponse:
      description: Paginated list of trusted servers response
      properties:
        ocs:
          $ref: '#/components/schemas/OCSMeta'
        data:
          items:
            $ref: '#/components/schemas/TrustedServer'
          type: array
      title: TrustedServersListResponse
      type: object
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    SharedSecretsListResponse:
      description: Paginated list of shared secrets response
      properties:
        ocs:
          $ref: '#/components/schemas/OCSMeta'
        data:
          items:
            $ref: '#/components/schemas/SharedSecret'
          type: array
      title: SharedSecretsListResponse
      type: object
      x-component-files:
      - cloud-core/apps/files_sharing/lib/Controller/ShareAPIController.php
    GroupDetailsResponse:
      description: Response schema for retrieving group details and members
      properties:
        ocs:
          properties:
            meta:
              $ref: '#/components/schemas/MetaData'
            data:
              properties:
                gid:
                  type: string
                  description: Group ID/name
                displayname:
                  type: string
                  description: Group display name
                members:
                  items:
                    type: string
                  type: array
                  description: List of user IDs who are members of this group
              type: object
              description: Group details object
          required:
          - meta
          - data
          type: object
      title: GroupDetailsResponse
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    SubAdminsList:
      description: Response schema for listing subadmins of a group
      properties:
        ocs:
          properties:
            meta:
              $ref: '#/components/schemas/MetaData'
            data:
              items:
                type: string
                description: User ID of the subadmin
              type: array
              description: List of user IDs who are subadmins of this group
          required:
          - meta
          - data
          type: object
      title: SubAdminsList
      type: object
      x-component-files:
      - cloud-core/lib/base/application.php
    UserProfileUpdateResponse:
      description: Response schema for profile/avatar update operations
      properties:
        data:
          type: object
          properties:
            message:
              type: string
            displayname:
              type: string
      required:
      - data
      title: UserProfileUpdateResponse
      type: object
      x-component-files:
      - /cloud-core/core/routes.php
      - /cloud-core/core/Controller/AvatarController.php
    LoginRequest:
      type: object
      properties:
        user:
          type: string
          description: Username for authentication
        password:
          type: string
          format: password
          description: Password for authentication
        redirect_url:
          type: string
          description: URL to redirect after successful login
        timezone:
          type: string
          description: User's timezone
        remember_login:
          type: string
          description: Set to '1' to enable remember me functionality
      x-component-files:
      - cloud-core/core/routes.php
    TokenGenerationRequest:
      type: object
      properties:
        app_id:
          type: string
          description: Application ID for token generation
      x-component-files:
      - cloud-core/core/routes.php
    OccCommandRequest:
      type: object
      properties:
        command:
          type: string
          description: OCC command to execute (e.g., 'user:list', 'config:system:get')
        parameters:
          type: array
          items:
            type: string
          description: Command parameters and arguments
      x-component-files:
      - cloud-core/core/routes.php
    GracePeriodResponse:
      type: object
      description: License grace period information response
      properties:
        grace_period_start:
          type: integer
          format: unixtime
          description: Unix timestamp when grace period started
        grace_period_end:
          type: integer
          format: unixtime
          description: Unix timestamp when grace period ends
        apps:
          type: integer
          description: Number of apps actively using the grace period
      required:
      - grace_period_start
      - grace_period_end
      x-component-files:
      - /cloud-core/core/Controller/LicenseController.php
    MimeTypeEntryResponse:
      description: A mime type entry with app providers
      properties:
        app_providers:
          description: List of apps that can handle this mime type
          items:
            properties:
              icon:
                type: string
              name:
                type: string
            required:
            - name
            title: AppProviderInfo
            type: object
        default_application:
          description: The default app for this mime type
          type: string
        description:
          description: Description of the file format
          type: string
        ext:
          description: File extension
          type: string
        mime_type:
          description: MIME type identifier
          type: string
        name:
          description: Display name for the file format
          type: string
      required:
      - mime_type
      - app_providers
      - ext
      - name
      title: MimeTypeEntryResponse
      type: object
      x-component-files:
      - cloud-core/core/Controller/AppRegistryController.php
    MimeTypesListResponse:
      description: Response for /app/list endpoint containing list of mime types
      properties:
        mime-types:
          description: Array of mime type entries with app providers
          items:
            $ref: '#/components/schemas/MimeTypeEntryResponse'
          type: array
      required:
      - mime-types
      title: MimeTypesListResponse
      type: object
      x-component-files:
      - cloud-core/core/Controller/AppRegistryController.php
    OpenWithWebResponse:
      description: Response for opening a file with a web application
      properties:
        uri:
          description: URL to open the file in the specified application
          type: string
      required:
      - uri
      title: OpenWithWebResponse
      type: object
      x-component-files:
      - cloud-core/core/Controller/AppRegistryController.php
    NewDocumentRequest:
      description: Request payload for creating a new document
      properties:
        filename:
          description: Name of the file to create
          type: string
        parent_container_id:
          description: File ID of the parent folder/container where the file will
            be created
          type: string
      required:
      - parent_container_id
      - filename
      title: NewDocumentRequest
      type: object
      x-component-files:
      - cloud-core/core/Controller/AppRegistryController.php
    NewDocumentResponse:
      description: Response for successfully created document
      properties:
        file_id:
          description: The file ID of the newly created file
          type: string
      required:
      - file_id
      title: NewDocumentResponse
      type: object
      x-component-files:
      - cloud-core/core/Controller/AppRegistryController.php
    CapabilitiesResponse:
      description: Response object for server capabilities endpoint containing version
        and feature information
      properties:
        data:
          description: Capabilities response data
          properties:
            capabilities:
              $ref: '#/components/schemas/Capabilities'
              description: Server capabilities including file sharing, notifications,
                etc.
            version:
              description: Server version information
              properties:
                edition:
                  description: Product edition (e.g., Community, Enterprise)
                  type: string
                major:
                  description: Major version number
                  format: int32
                  type: integer
                micro:
                  description: Micro/patch version number
                  format: int32
                  type: integer
                minor:
                  description: Minor version number
                  format: int32
                  type: integer
                product:
                  description: Product name
                  type: string
                string:
                  description: Human-readable version string
                  type: string
              required:
              - major
              - minor
              - micro
              - string
              - edition
              - product
              title: VersionInfo
              type: object
          required:
          - version
          - capabilities
          title: CapabilitiesData
          type: object
      ocs:
        $ref: '#/components/schemas/OCSMeta'
        description: OCS response metadata
      required:
      - ocs
      - data
      title: CapabilitiesResponse
      type: object
      x-component-files:
      - cloud-core/core/routes.php
      - cloud-core/core/Controller/CloudController.php
    OcmDiscoveryResponse:
      description: OCM provider discovery response
      properties:
        apiVersion:
          description: OCM API version supported by this server
          example: 1.0-proposal1
          type: string
        enabled:
          description: Whether OCM federated sharing is enabled on this server
          type: boolean
        endPoint:
          description: Base URL for the OCM endpoint
          example: https://server.com/index.php/apps/federatedfilesharing
          type: string
        shareTypes:
          description: List of supported share types and their protocols
          items:
            properties:
              name:
                description: Name of the resource type
                example: file
                type: string
              protocols:
                description: Supported protocols for this resource type
                items:
                  type: string
                type: array
            required:
            - name
            - protocols
            type: object
          type: array
        x-ocm-version:
          description: OCM protocol version
          enum:
          - '0.3'
          - 1.0-proposal1
          example: 1.0-proposal1
          type: string
      required:
      - enabled
      - apiVersion
      - endPoint
      - shareTypes
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
      - cloud-core/apps/federatedfilesharing/lib/Controller/OcmController.php
    OcmShareRequest:
      description: OCM 1.0-proposal1 share creation request
      properties:
        description:
          description: Optional description of the shared resource
          example: Shared document
          type: string
        name:
          description: Name of the shared resource (mountpoint name)
          example: Documents
          type: string
        owner:
          description: Identifier of the user that owns the resource
          example: alice@server.com
          type: string
        ownerDisplayName:
          description: Display name of the owner
          example: Alice Smith
          type: string
        providerId:
          description: Identifier of the resource at the provider side (remote ID)
          example: '12345'
          type: string
        protocol:
          $ref: '#/components/schemas/OcmShareProtocol'
          description: Protocol information for accessing the shared resource
        resourceType:
          default: file
          description: Resource type being shared (only 'file' is supported)
          enum:
          - file
          example: file
          type: string
        sender:
          description: Provider specific identifier of the user that wants to share
            the resource
          example: alice@server.com
          type: string
        senderDisplayName:
          description: Display name of the sender
          example: Alice Smith
          type: string
        shareType:
          default: user
          description: Share type (only 'user' is supported)
          enum:
          - user
          example: user
          type: string
        shareWith:
          description: Identifier of the user or group to share the resource with
          example: bob@server.com
          type: string
      required:
      - name
      - owner
      - providerId
      - protocol
      - resourceType
      - sender
      - shareType
      - shareWith
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
      - cloud-core/apps/federatedfilesharing/lib/Controller/OcmController.php
    OcmShareProtocol:
      description: OCM protocol information for accessing shared resources
      properties:
        name:
          default: webdav
          description: Protocol name (only 'webdav' is supported)
          enum:
          - webdav
          example: webdav
          type: string
        options:
          additionalProperties: true
          description: 'Protocol-specific options. For webdav: sharedSecret (username/password),
            uri, access_token'
          properties:
            access_token:
              description: Access token for the protocol
              type: string
            password:
              description: Password for basic auth
              example: shared-secret-token
              type: string
            permissions:
              description: Permission flags for the share (OCM 1.0 format)
              items:
                enum:
                - read
                - write
                - share
                type: string
              type: array
            sharedSecret:
              description: Shared secret used as username/password for webdav access
              example: abc123secret
              type: string
            uri:
              description: WebDAV URI for accessing the resource
              example: https://server.com/public.php/webdav/
              type: string
          required:
          - sharedSecret
          type: object
      required:
      - name
      - options
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
      - cloud-core/apps/federatedfilesharing/lib/Controller/OcmController.php
    OcmErrorResponse:
      description: OCM error response
      properties:
        message:
          description: Error message describing what went wrong
          example: User does not exist
          type: string
      required:
      - message
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
      - cloud-core/apps/federatedfilesharing/lib/Controller/OcmController.php
    OcmNotificationRequest:
      description: OCM notification request for processing share events
      properties:
        notificationType:
          description: Type of notification being processed
          enum:
          - SHARE_ACCEPTED
          - SHARE_DECLINED
          - REQUEST_RESHARE
          - RESHARE_CHANGE_PERMISSION
          - SHARE_UNSHARED
          example: SHARE_ACCEPTED
          type: string
        providerId:
          description: Identifier of the resource at the provider side
          example: '12345'
          type: string
        resourceType:
          default: file
          description: Resource type being shared (only 'file' is supported)
          enum:
          - file
          example: file
          type: string
        notification:
          additionalProperties: true
          description: Additional parameters depending on notification type and resource
            type
          properties:
            permission:
              description: Permission for RESHARE_CHANGE_NOTIFICATION (OCM 1.0 format)
              items:
                enum:
                - read
                - write
                - share
                type: string
              type: array
            sharedSecret:
              description: Shared secret for authentication
              example: abc123secret
              type: string
            senderId:
              description: Sender identifier for REQUEST_RESHARE notification
              example: alice@server.com
              type: string
            shareWith:
              description: Target user for REQUEST_RESHARE notification
              example: bob@server.com
              type: string
          required:
          - sharedSecret
          type: object
      required:
      - notificationType
      - providerId
      - resourceType
      - notification
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
      - cloud-core/apps/federatedfilesharing/lib/Controller/OcmController.php
    OcmReShareRequest:
      description: OCM re-share request
      properties:
        permission:
          description: Permission flags for the re-share (integer format)
          example: 19
          type: integer
        remoteId:
          description: Remote ID of the original share
          example: '67890'
          type: string
        shareWith:
          description: Identifier of the user to re-share with
          example: charlie@server.com
          type: string
      required:
      - permission
      - remoteId
      - shareWith
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
    OcmShareManagementRequest:
      description: OCM share management request parameters
      properties:
        token:
          description: Token used for authentication of the share operation
          example: abc123secret
          type: string
      required:
      - token
      type: object
      x-component-files:
      - cloud-core/apps/federatedfilesharing/appinfo/routes.php
    SearchRequestQueryParams:
      type: object
      description: Query parameters for /core/search endpoint
      properties:
        query:
          type: string
          description: The search query text. If empty, the endpoint returns false.
          example: document.txt
        inApps:
          type: array
          items:
            type: string
          description: Filter results by app(s). Defaults to empty array if not provided.
          example:
          - files
        page:
          type: integer
          description: 'Page number for pagination. Default: 1'
          minimum: 1
          default: 1
          example: 1
        size:
          type: integer
          description: 'Number of results per page. Default: 30'
          minimum: 1
          default: 30
          example: 30
      x-component-files:
      - cloud-core/core/routes.php
      - cloud-core/core/search/ajax/search.php
    SearchResponseItem:
      type: object
      description: A single search result item returned by the /core/search endpoint
      properties:
        name:
          type: string
          description: The name of the searched item (file, folder, etc.)
        link:
          type: string
          format: uri
          description: URL to access the searched item
        path:
          type: string
          description: Path location of the item within ownCloud storage
        type:
          type: string
          description: Type/category of the search result (e.g., file, folder)
        icon:
          type: string
          format: uri
          description: Icon URL for the item type
      x-component-files:
      - cloud-core/core/search/ajax/search.php
      title: SearchResponseItem
    SearchResponseExample:
      type: array
      items:
        $ref: '#/components/schemas/SearchResponseItem'
      description: Array of search results returned by the /core/search endpoint
      x-component-files:
      - cloud-core/core/search/ajax/search.php
    TwoFactorChallengeSelectResponse:
      type: object
      description: Response from GET /login/selectchallenge - lists available 2FA
        providers or redirects to challenge page if only one provider exists
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/TwoFactorProvider'
          description: List of available two-factor authentication providers
      x-component-files:
      - /cloud-core/core/routes.php
    TwoFactorProvider:
      type: object
      description: A two-factor authentication provider
      properties:
        id:
          type: string
          description: Unique identifier for the provider
        name:
          type: string
          description: Human-readable name of the provider
      x-component-files:
      - /cloud-core/core/routes.php
    TwoFactorChallengeTemplateResponse:
      type: object
      description: Response from GET /login/challenge/{providerId} - returns the challenge
        template for a specific 2FA provider
      properties:
        error:
          type: boolean
          description: Whether an error occurred during authentication
        error_message:
          type: string
          description: Error message if an error occurred
        provider_id:
          type: string
          description: The challenge provider ID
        template_html:
          type: string
          description: HTML template for the 2FA challenge
        redirect_url:
          type: string
          description: URL to redirect after successful authentication
      x-component-files:
      - /cloud-core/core/routes.php
    TwoFactorChallengeSolveRequest:
      type: object
      description: Request body for POST /login/challenge/{providerId} - submits the
        user's 2FA challenge response
      properties:
        challenge:
          type: string
          description: The user's response to the 2FA challenge
        redirect_url:
          type: string
          description: URL to redirect after successful authentication
      x-component-files:
      - /cloud-core/core/routes.php
    TwoFactorChallengeNotFoundErrorResponse:
      type: object
      description: Error response when a challenge provider is not found
      properties:
        error:
          type: string
          description: Error description
      x-component-files:
      - /cloud-core/core/routes.php
    ConfigResponse:
      type: object
      properties:
        version:
          type: string
        website:
          type: string
        host:
          type: string
        contact:
          type: string
        ssl:
          type: boolean
      required:
      - version
      - website
      - host
      - contact
      - ssl
      x-component-files:
      - /cloud-core/core/Controller/OcsController.php
    PersonCheckResponse:
      type: object
      properties:
        personid:
          type: string
      description: User ID returned on successful authentication check
      x-component-files:
      - /cloud-core/core/Controller/OcsController.php
    PrivatedataAttribute:
      type: object
      properties:
        key:
          type: string
        app:
          type: string
        value:
          type: string
      description: Private data attribute record from privatedata database table
      x-component-files:
      - /cloud-core/core/Controller/OcsController.php
    ExternalStorageMount:
      type: object
      description: Schema for external storage mount point configuration details
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier of the mount point
        mountPoint:
          type: string
          description: Mount point path (e.g., '/ExternalStorage')
        storage:
          type: object
          properties:
            class:
              type: string
              description: Authentication mechanism/backend class name
            configuration:
              type: object
              additionalProperties: true
              description: Backend-specific configuration parameters
          required:
          - class
          description: Storage backend type and its configuration
        quota:
          type: integer
          format: int64
          description: Storage quota in bytes (0 = unlimited)
        applicable:
          type: array
          items:
            properties:
              type:
                type: integer
                enum:
                - 0
                - 1
                description: User or Group type
              id:
                type: string
                description: User ID or Group ID
            required:
            - type
            - id
          description: List of users and groups this mount is available to
        mountType:
          type: string
          enum:
          - personal
          - system
          description: Mount type - personal (user-specific) or system (global)
        storageId:
          type: integer
          format: int32
          description: Storage backend identifier
      required:
      - id
      - mountPoint
      - applicable
      x-component-files:
      - cloud-core/apps/files_external/lib/Controller/StoragesController.php
    CreateExternalStorageRequest:
      type: object
      description: Request schema for creating a new external storage mount point
      properties:
        mountPoint:
          type: string
          description: Mount point path (e.g., '/GoogleDrive', '/SMBStorage')
        storageClass:
          type: string
          description: Authentication mechanism/backend class name (e.g., 'OC\Files\External\Backend\S3',
            'OC\Files\External\Backend\WebDAV')
        configuration:
          type: object
          additionalProperties: true
          description: 'Backend-specific configuration parameters. Examples: {''username'':
            ''user'', ''password'': ''secret''} for basic auth; {''bucket'': ''my-bucket'',
            ''location'' : ''us-east-1''} for S3'
        quota:
          type: integer
          format: int64
          description: Storage quota in bytes (0 = unlimited)
        applicableUsers:
          type: array
          items:
            type: string
          description: List of user IDs this mount is available to
        applicableGroups:
          type: array
          items:
            type: string
          description: List of group IDs this mount is available to
        mountType:
          type: string
          enum:
          - personal
          - system
          description: Mount type - personal (user-specific) or system (global)
        priority:
          type: integer
          description: Mount priority for ordering
      required:
      - mountPoint
      - storageClass
      - applicableUsers
      - applicableGroups
      x-component-files:
      - cloud-core/apps/files_external/lib/Controller/StoragesController.php
    ExternalStorageUpdateRequest:
      type: object
      description: Request schema for updating an existing external storage mount
        point configuration
      properties:
        mountPoint:
          type: string
          description: New mount point path
        storageClass:
          type: string
          description: New authentication mechanism/backend class name
        configuration:
          type: object
          additionalProperties: true
          description: Updated backend-specific configuration parameters
        quota:
          type: integer
          format: int64
          description: Storage quota in bytes (0 = unlimited)
        applicableUsers:
          type: array
          items:
            type: string
          description: Updated list of user IDs this mount is available to
        applicableGroups:
          type: array
          items:
            type: string
          description: Updated list of group IDs this mount is available to
      x-component-files:
      - cloud-core/apps/files_external/lib/Controller/StoragesController.php
    OCSMeta:
      type: object
      description: Standard OCS API response metadata wrapper
      properties:
        meta:
          $ref: '#/components/schemas/MetaData'
        data:
          type: array
          items: {}
          description: Response data
      required:
      - meta
      x-component-files:
      - cloud-core/apps/files_external/lib/Controller/StoragesController.php
  responses:
    UnauthorizedResponse:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenResponse:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UserUpdatedResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserUpdateResult'
      description: User updated successfully
    BadRequestResponse:
      description: 400 Bad Request - Invalid request parameters or missing required
        fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestResponse'
      x-component-files:
      - cloud-core/lib/base/application.php
    NotFoundResponse:
      description: 404 Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundResponse'
      x-component-files:
      - cloud-core/lib/base/application.php
    ConflictResponse:
      description: 409 Conflict - Resource conflict (e.g., user already exists)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictResponse'
      x-component-files:
      - cloud-core/lib/base/application.php
  requestBodies:
    UserCreateBody:
      description: Request body for user creation endpoint
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/CreateUserRequest'
  headers:
    AuthorizationHeader:
      description: Bearer token authentication header
      schema:
        type: string
        format: bearer
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://your-domain.com/owncloud/apps/oauth/authorize
          tokenUrl: https://your-domain.com/owncloud/apps/oauth/token
          scopes:
            user.read: Read user information
            user.write: Modify user information
            group.read: Read group information
            group.write: Modify group information
            files.read: Read files and folders
            files.write: Write files and folders
            sharing.read: Read sharing information
            sharing.write: Create and modify shares
            ADMIN_AUTH: Admin authorization for subadmin management and privileged
              operations
      description: OAuth2 authentication for ownCloud API. Used for external storage
        integration (Google Drive, Dropbox) and token-based client access.
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication for ownCloud API. Used for DAV endpoints
        and programmatic access. Credentials are sent in the Authorization header
        using base64 encoding.
    ocs_auth:
      description: OCS API authentication using HTTP Basic Auth. Used for OCS (Open
        Collaboration Services) endpoints.
      scheme: basic
      type: http
servers:
- url: https://your-domain.com/owncloud
  description: Production server - ownCloud instance
- url: https://localhost/owncloud
  description: Development server - local instance
- url: https://host.docker.internal:9081
  description: ownCloud Core API Server - Development Environment
paths:
  /ocs/v1.php/cloud/users:
    get:
      operationId: listUsers
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/UsersListResponse'
          description: List of users
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
      summary: List all users
      tags:
      - Provisioning API
      security:
      - OAuth2:
        - user.read
      parameters:
      - description: Page number (1-indexed)
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: Number of items per page
        in: query
        name: per_page
        schema:
          default: 25
          maximum: 100
          minimum: 1
          type: integer
    post:
      operationId: createUser
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties:
                password:
                  type: string
                displayname:
                  type: string
              required:
              - password
              - displayname
              type: object
              $ref: '#/components/schemas/CreateUserRequest'
      summary: Create a new user
      tags:
      - Provisioning API
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/StandardSuccessResponse'
          description: User created successfully
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
      security:
      - OAuth2:
        - user.write
    description: OCS Provisioning API - User management endpoints
    x-path-files:
    - cloud-core/lib/base/application.php
  /ocs/v1.php/cloud/users/{userid}:
    get:
      operationId: getUser
      parameters:
      - in: path
        name: userid
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/User'
          description: User details retrieved successfully
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
          description: User not found
      summary: Get user information
      tags:
      - Provisioning API
      security:
      - OAuth2:
        - user.read
    put:
      operationId: editUser
      parameters:
      - in: path
        name: userid
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties:
                displayname:
                  type: string
                  description: User display name
                email:
                  type: string
                  description: User email address
                  format: email
              type: object
              title: EditUserRequest
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResult'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
          description: User not found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictResponse'
          description: Username already exists
      summary: Edit user information
      tags:
      - Provisioning API
      security:
      - OAuth2:
        - user.write
    delete:
      operationId: deleteUser
      parameters:
      - in: path
        name: userid
        required: true
        schema:
          type: string
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundResponse'
          description: User not found
      summary: Delete a user
      tags:
      - Provisioning API
      security:
      - OAuth2:
        - user.write
    x-path-files:
    - cloud-core/lib/base/application.php
  /ocs/v1.php/cloud/users/{userid}/enable:
    put:
      operationId: enableUser
      parameters:
      - in: path
        name: userid
        required: true
        schema:
          type: string
          example: johndoe
      responses:
        '200':
          description: User enabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
      summary: Enable a user
      tags:
      - Provisioning API
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              properties: {}
              type: object
          description: No body required for enabling user
      security:
      - OAuth2:
        - user.write
    description: Enable a user account. Only users with subadmin or admin privileges
      can enable other users.
  /ocs/v1.php/cloud/users/{userid}/disable:
    put:
      operationId: disableUser
      parameters:
      - in: path
        name: userid
        required: true
        schema:
          type: string
          example: johndoe
      responses:
        '200':
          description: User disabled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
